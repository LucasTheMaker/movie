<style>
    /* Sleek Apple Music Slider */
    .progress-container { 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        width: 100%; 
        max-width: 500px; 
        font-size: 12px; 
        color: var(--text-gray); 
        font-variant-numeric: tabular-nums; 
    }

    input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        background: #333;
        height: 4px;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        transition: height 0.2s;
    }

    input[type="range"]:hover { height: 6px; }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 12px;
        width: 12px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
        cursor: pointer;
    }

    /* Full Player Seek Bar */
    #f-seek { width: 100%; height: 6px; margin-top: 20px; }
</style>

<script>
    const player = document.getElementById('audio-player');
    const seekSlider = document.getElementById('seek-slider');
    const fullSeek = document.getElementById('f-seek');

    // --- TIME UPDATES ---
    player.ontimeupdate = () => {
        if (!isNaN(player.duration)) {
            // Calculate percentage
            const perc = (player.currentTime / player.duration) * 100;
            
            // Update the slider positions
            seekSlider.value = perc;
            fullSeek.value = perc;

            // Update Time Text
            document.getElementById('current-time').innerText = formatTime(player.currentTime);
            document.getElementById('f-current').innerText = formatTime(player.currentTime);
            document.getElementById('duration').innerText = formatTime(player.duration);
            document.getElementById('f-total').innerText = formatTime(player.duration);
        }
    };

    // --- SCRUBBING LOGIC (The "Skip to Timestamp" Part) ---
    function scrub(e) {
        const scrubTime = (e.target.value / 100) * player.duration;
        player.currentTime = scrubTime;
    }

    // Attach scrub event to both sliders
    seekSlider.oninput = scrub;
    fullSeek.oninput = scrub;

    // --- TRACK NAVIGATION ---
    function nextTrack() {
        if (index < currentTracks.length - 1) {
            playTrack(index + 1, document.getElementById('p-img').src, document.getElementById('p-album').innerText);
        }
    }

    function prevTrack() {
        // If song is more than 3 seconds in, restart the song instead of skipping back
        if (player.currentTime > 3) {
            player.currentTime = 0;
        } else if (index > 0) {
            playTrack(index - 1, document.getElementById('p-img').src, document.getElementById('p-album').innerText);
        }
    }

    // Format seconds into 0:00
    function formatTime(s) {
        if (isNaN(s)) return "0:00";
        let min = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return min + ":" + (sec < 10 ? "0" : "") + sec;
    }

    // Auto-play next song when current one ends
    player.onended = nextTrack;
</script>

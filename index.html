<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spotify Style Player</title>

<style>
body{
margin:0;
font-family: -apple-system, Arial;
background:#000;
color:#fff;
overflow:hidden;
}

.page{display:none;padding:20px;}
.page.active{display:block;}

/* HOME */
.card{
height:200px;
border-radius:20px;
background:#222;
display:flex;
align-items:flex-end;
padding:15px;
font-size:22px;
font-weight:700;
cursor:pointer;
}

/* ALBUM */
.track{
padding:15px;
border-bottom:1px solid #111;
cursor:pointer;
display:flex;
justify-content:space-between;
}

/* PLAYER */
#player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:15px;
box-sizing:border-box;
}

#progress{
width:100%;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

button{
background:#222;
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
}

.small{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<!-- PAGES -->
<div id="home" class="page active"></div>
<div id="albumPage" class="page"></div>

<!-- PLAYER -->
<div id="player">
<div id="now">Nothing playing</div>

<input id="progress" type="range" min="0" max="100" value="0">

<div class="controls">
<button onclick="togglePlay()">⏯</button>
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="toggleShuffle()">🔀</button>
<button onclick="toggleRepeat()">🔁</button>
<button onclick="toggleFav()">❤️</button>
</div>

<div class="controls">
<input id="volume" type="range" min="0" max="1" step="0.01" value="1">
</div>
</div>

<audio id="audio"></audio>

<script>

// ================= DATA =================
const albums = [
{
name:"BULLY",
artist:"Kanye West",
tracks:[
{name:"KING", file:"KING_spotdown.org bully.mp3"},
{name:"THIS A MUST", file:"THIS A MUST_spotdown.org.mp3"}
]
},
{
name:"ye",
artist:"Kanye West",
tracks:[
{name:"Yikes", file:"2. Yikes.mp3"}
]
},
{
name:"VULTURES 1",
artist:"Kanye West",
tracks:[
{name:"STARS", file:"STARS.mp3"},
{name:"CARNIVAL", file:"CARNIVAL.mp3"}
]
}
];

// ================= STATE =================
let currentAlbum = null;
let currentIndex = 0;
let isShuffle = false;
let repeat = false;

let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

// ================= AUDIO =================
const audio = document.getElementById("audio");
const now = document.getElementById("now");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

// ================= NAV =================
function showHome(){
document.getElementById("home").classList.add("active");
document.getElementById("albumPage").classList.remove("active");

let html = `<h2>Albums</h2>`;
albums.forEach((a,i)=>{
html += `<div class="card" onclick="openAlbum(${i})">${a.name}</div>`;
});
document.getElementById("home").innerHTML = html;
}

function openAlbum(i){
currentAlbum = albums[i];
document.getElementById("home").classList.remove("active");
document.getElementById("albumPage").classList.add("active");

let html = `<h2>${currentAlbum.name}</h2>`;

currentAlbum.tracks.forEach((t,i)=>{
html += `
<div class="track" onclick="play(${i})">
<div>${t.name}</div>
<div onclick="event.stopPropagation(); toggleFavTrack('${t.name}')">
${favorites.includes(t.name) ? "❤️" : "🤍"}
</div>
</div>
`;
});

document.getElementById("albumPage").innerHTML = html;
}

// ================= PLAYER =================
function play(i){
currentIndex = i;
const t = currentAlbum.tracks[i];

audio.src = t.file;
audio.play();

now.innerText = currentAlbum.name + " - " + t.name;
}

function togglePlay(){
if(audio.paused) audio.play();
else audio.pause();
}

function next(){
if(!currentAlbum) return;

if(isShuffle){
currentIndex = Math.floor(Math.random()*currentAlbum.tracks.length);
}else{
currentIndex++;
if(currentIndex >= currentAlbum.tracks.length){
if(repeat) currentIndex = 0;
else return;
}
}
play(currentIndex);
}

function prev(){
if(!currentAlbum) return;
currentIndex--;
if(currentIndex < 0) currentIndex = 0;
play(currentIndex);
}

// ================= CONTROLS =================
function toggleShuffle(){ isShuffle = !isShuffle; }
function toggleRepeat(){ repeat = !repeat; }

function toggleFav(){
if(!currentAlbum) return;
const t = currentAlbum.tracks[currentIndex].name;

if(favorites.includes(t)){
favorites = favorites.filter(f => f !== t);
}else{
favorites.push(t);
}

localStorage.setItem("fav", JSON.stringify(favorites));
}

// ================= TRACK FAVORITES =================
function toggleFavTrack(name){
if(favorites.includes(name)){
favorites = favorites.filter(f => f !== name);
}else{
favorites.push(name);
}
localStorage.setItem("fav", JSON.stringify(favorites));
openAlbum(albums.indexOf(currentAlbum));
}

// ================= PROGRESS =================
audio.ontimeupdate = ()=>{
progress.value = (audio.currentTime / audio.duration) * 100 || 0;
};

progress.oninput = ()=>{
audio.currentTime = (progress.value / 100) * audio.duration;
};

volume.oninput = ()=>{
audio.volume = volume.value;
};

audio.onended = next;

// ================= INIT =================
showHome();

</script>

</body>
</html>

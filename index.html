<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg-black: #000; --card-grey: #1c1c1e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        @media (max-width: 768px) {
            .desktop-ui { display: none; }
            .mobile-ui { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.95); backdrop-filter: blur(25px); border-top: 0.5px solid #333; z-index: 4000; display: flex; padding: 12px 0; }
            .content { padding: 20px 20px 100px; }
            .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; cursor: pointer; }
            .nav-item.active { color: var(--apple-red); }
        }

        @media (min-width: 769px) {
            .mobile-ui { display: none; }
            body { display: flex; height: 100vh; }
            .sidebar { width: 260px; background: #111; border-right: 0.5px solid #333; padding: 60px 25px; }
            .content { flex: 1; overflow-y: auto; padding: 60px 50px; }
            .top-player { position: fixed; top: 0; left: 0; width: 100%; height: 55px; background: #222; border-bottom: 0.5px solid #333; z-index: 2000; display: flex; align-items: center; justify-content: center; }
            .nav-link { padding: 12px; color: #aaa; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
            .nav-link.active { background: #222; color: var(--apple-red); font-weight: bold; }
        }

        /* --- PAGES --- */
        .page { display: none; }
        .page.active { display: block; }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .album-card { cursor: pointer; transition: 0.2s; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* --- SEARCH --- */
        .search-bar { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #222; color: #fff; font-size: 16px; margin-bottom: 20px; }
        .result-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 0.5px solid #333; }
        .result-item:hover { background: #222; }

        /* --- ALBUM MODAL --- */
        .album-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding-top: 60px; }
        .track-row { display: flex; padding: 12px 20px; border-bottom: 0.5px solid #222; font-size: 15px; }
    </style>
</head>
<body>

    <div class="top-player desktop-ui">
        <div style="background:#000; border:1px solid #444; border-radius:4px; padding:4px 60px; font-size:12px;">iTunes Archive v2026.4</div>
    </div>

    <div class="sidebar desktop-ui">
        <div class="nav-link active" onclick="switchTab('music', this)">🎵 Music</div>
        <div class="nav-link" onclick="switchTab('movies', this)">🎬 Movies</div>
        <div class="nav-link" onclick="switchTab('search', this)">🔍 Search</div>
    </div>

    <div class="content">
        <div id="musicPage" class="page active">
            <div id="artistPicker">
                <h1>Artists</h1>
                <div class="album-grid">
                    <div class="album-card" onclick="loadArtist('Kanye West')">
                        <img src="https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg">
                        <p style="text-align:center; font-weight:bold; margin-top:10px;">Kanye West</p>
                    </div>
                </div>
            </div>
            <div id="artistProfile" style="display:none;">
                <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                    <img id="pfp" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--apple-red);">
                    <h1 id="aName" style="font-size:32px; margin:0;"></h1>
                </div>
                <h3>Essential Albums</h3>
                <div class="album-grid" id="essGrid"></div>
                <h3>All Albums</h3>
                <div class="album-grid" id="fullGrid"></div>
            </div>
        </div>

        <div id="moviesPage" class="page">
            <iframe id="movieFrame" style="width:100%; height:85vh; border:none; border-radius:15px; background:#111;"></iframe>
        </div>

        <div id="searchPage" class="page">
            <h1>Search</h1>
            <input type="text" id="mainSearch" class="search-bar" placeholder="Search Artists, Albums, or Songs..." onkeyup="doSearch()">
            <div id="searchResults"></div>
        </div>
    </div>

    <div class="mobile-ui">
        <div class="nav-item active" onclick="switchTab('music', this)">🎵<br>Music</div>
        <div class="nav-item" onclick="switchTab('movies', this)">🎬<br>Movies</div>
        <div class="nav-item" onclick="switchTab('search', this)">🔍<br>Search</div>
    </div>

    <div id="albumView" class="album-view">
        <div style="padding: 20px; color: var(--apple-red); font-weight:bold; cursor:pointer;" onclick="closeAlbum()">‹ Back</div>
        <div id="albumContent"></div>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card: #1c1c1e; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- DESKTOP SIDEBAR --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 60px 20px; flex-shrink: 0; }
        .sidebar h2 { font-size: 11px; color: #555; letter-spacing: 1px; margin-bottom: 20px; }

        /* --- MOBILE BOTTOM NAV --- */
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-top: 1px solid #333; display: none; padding: 10px 0; z-index: 1000; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
        }

        /* --- NAV BUTTONS --- */
        .nav-btn { padding: 12px; color: #aaa; cursor: pointer; border-radius: 8px; margin-bottom: 5px; text-decoration: none; display: block; transition: 0.2s; font-size: 15px; }
        .nav-btn:hover { color: #fff; background: #222; }
        .nav-btn.active { background: #333; color: var(--apple-red); font-weight: bold; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--apple-red); }

        /* --- MAIN CONTENT --- */
        .main-view { flex: 1; overflow-y: auto; padding: 40px; position: relative; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI COMPONENTS --- */
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; margin-top: 20px; }
        .album-card { cursor: pointer; transition: transform 0.2s; text-align: center; }
        .album-card:hover { transform: scale(1.05); }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; background: #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 16px; margin-bottom: 20px; outline: none; border: 1px solid #333; }
        .search-hit { display: flex; align-items: center; gap: 15px; background: #111; padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid #222; }

        /* --- FULL SCREEN OVERLAYS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px; }
        .back-link { color: var(--apple-red); font-weight: bold; cursor: pointer; font-size: 17px; margin-bottom: 30px; display: inline-block; }
        .track-row { display: flex; padding: 12px 10px; border-bottom: 1px solid #222; align-items: center; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>LIBRARY</h2>
        <div class="nav-btn active" data-id="music" onclick="nav('music')">🎵 Music</div>
        <div class="nav-btn" data-id="movies" onclick="nav('movies')">🎬 Movies</div>
        <div class="nav-btn" data-id="search" onclick="nav('search')">🔍 Search</div>
    </nav>

    <main class="main-view">
        
        <div id="music-page" class="page active">
            <div id="artist-selector">
                <h1 style="font-size: 34px;">Artists</h1>
                <div class="album-grid">
                    <div class="album-card" onclick="openArtist('Kanye West')">
                        <img src="https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg">
                        <p style="margin-top:12px; font-weight:600;">Kanye West</p>
                    </div>
                </div>
            </div>

            <div id="artist-profile" style="display:none;">
                <div style="display:flex; align-items:center; gap:20px; margin-bottom:40px;">
                    <img id="profile-pfp" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--apple-red);">
                    <h1 id="profile-name" style="font-size:32px; margin:0;"></h1>
                </div>
                <h3>Essentials</h3>
                <div class="album-grid" id="ess-grid"></div>
                <h3>Discography</h3>
                <div class="album-grid" id="full-grid"></div>
            </div>
        </div>

        <div id="movies-page" class="page">
            <h1 style="margin-bottom:20px;">Movies</h1>
            <iframe id="movie-frame" style="width:100%; height:80vh; border:none; border-radius:15px; background:#111;"></iframe>
        </div>

        <div id="search-page" class="page">
            <h1>Search</h1>
            <input type="text" id="search-input" class="search-box" placeholder="Artists, Albums, or Songs..." onkeyup="search()">
            <div id="search-results"></div>
        </div>

    </main>

    <nav class="mobile-nav">
        <div class="nav-item active" data-id="music" onclick="nav('music')">🎵<br>Music</div>
        <div class="nav-item" data-id="movies" onclick="nav('movies')">🎬<br>Movies</div>
        <div class="nav-item" data-id="search" onclick="nav('search')">🔍<br>Search</div>
    </nav>

    <div id="album-overlay" class="overlay">
        <span class="back-link" onclick="closeAlbum()">‹ Back</span>
        <div id="album-details"></div>
    </div>

    <script>
        const db = {
            "Kanye West": {
                pfp: "https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg",
                albums: [
                    { title: "BULLY", year: 2026, essential: false, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png", tracks: ["Sisters and Brothers", "Father", "Bully", "Preacher Man", "Beauty and the Beast", "Last Breath"] },
                    { title: "The College Dropout", year: 2004, essential: true, img: "https://m.media-amazon.com/images/I/71R3OitAovL._AC_SL1200_.png", tracks: ["Intro", "We Don't Care", "All Falls Down", "Spaceship", "Jesus Walks", "Through The Wire"] },
                    { title: "Late Registration", year: 2005, essential: true, img: "https://m.media-amazon.com/images/I/719hE1Z7FzL._AC_SL1200_.png", tracks: ["Heard 'Em Say", "Touch The Sky", "Gold Digger", "Hey Mama"] },
                    { title: "MBDTF", year: 2010, essential: true, img: "https://m.media-amazon.com/images/I/91M9pUeHbeL._AC_SL1500_.png", tracks: ["Dark Fantasy", "Power", "Monster", "Runaway"] },
                    { title: "The Life of Pablo", year: 2016, essential: true, img: "https://m.media-amazon.com/images/I/61q3K-o1E6L._AC_SL1000_.png", tracks: ["Ultralight Beam", "FSMH Pt. 1", "Famous", "Waves", "Wolves"] },
                    { title: "Kids See Ghosts", year: 2018, essential: true, img: "https://m.media-amazon.com/images/I/71E3v1-E9jL._AC_SL1200_.png", tracks: ["Feel The Love", "Fire", "4th Dimension", "Reborn"] }
                ]
            }
        };

        // NAVIGATION LOGIC
        function nav(id) {
            // Update Pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');

            // Update UI Buttons
            document.querySelectorAll('.nav-btn, .nav-item').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-id') === id) btn.classList.add('active');
            });

            // Handle Movie Iframe Refresh
            if(id === 'movies') {
                const frame = document.getElementById('movie-frame');
                if(!frame.src) frame.src = "https://lucasthemaker.github.io/movie/index.html";
            }
        }

        // MUSIC LOGIC
        function openArtist(name) {
            const artist = db[name];
            document.getElementById('artist-selector').style.display = 'none';
            document.getElementById('artist-profile').style.display = 'block';
            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-pfp').src = artist.pfp;

            const essGrid = document.getElementById('ess-grid');
            const fullGrid = document.getElementById('full-grid');
            essGrid.innerHTML = ""; fullGrid.innerHTML = "";

            artist.albums.forEach((alb, i) => {
                const html = `<div class="album-card" onclick="openAlbum('${name}', ${i})"><img src="${alb.img}"><p style="font-weight:600; font-size:14px; margin-top:10px;">${alb.title}</p></div>`;
                fullGrid.innerHTML += html;
                if(alb.essential) essGrid.innerHTML += html;
            });
        }

        function openAlbum(artistName, index) {
            const alb = db[artistName].albums[index];
            const content = document.getElementById('album-details');
            content.innerHTML = `
                <div style="text-align:center;">
                    <img src="${alb.img}" style="width:280px; border-radius:15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
                    <h1 style="margin:25px 0 5px;">${alb.title}</h1>
                    <p style="color:var(--apple-red); font-weight:bold; font-size:18px; margin-bottom:40px;">${artistName}</p>
                    <div style="max-width:700px; margin: 0 auto; background:#111; border-radius:12px;">
                        ${alb.tracks.map((t, i) => `<div class="track-row"><span style="color:#555; width:30px;">${i+1}</span><span style="flex:1;">${t}</span></div>`).join('')}
                    </div>
                </div>`;
            document.getElementById('album-overlay').style.display = 'block';
        }

        function closeAlbum() { document.getElementById('album-overlay').style.display = 'none'; }

        // SEARCH LOGIC
        function search() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const results = document.getElementById('search-results');
            results.innerHTML = "";
            if(!query) return;

            for (const artist in db) {
                if(artist.toLowerCase().includes(query)) {
                    results.innerHTML += `<div class="search-hit" onclick="nav('music'); openArtist('${artist}')"><img src="${db[artist].pfp}" style="width:40px; border-radius:50%;"><div><b>${artist}</b><br><small>Artist</small></div></div>`;
                }
                db[artist].albums.forEach((alb, i) => {
                    if(alb.title.toLowerCase().includes(query)) {
                        results.innerHTML += `<div class="search-hit" onclick="openAlbum('${artist}', ${i})"><img src="${alb.img}" style="width:40px; border-radius:4px;"><div><b>${alb.title}</b><br><small>Album • ${artist}</small></div></div>`;
                    }
                });
            }
        }
    </script>
</body>
</html>

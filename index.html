<script>
// ================= ELEMENTS =================
const home = document.getElementById("home");
const artist = document.getElementById("artist");
const mini = document.getElementById("mini");
const full = document.getElementById("full");

const m_title = document.getElementById("m-title");
const m_artist = document.getElementById("m-artist");
const m_btn = document.getElementById("m-btn");

const f_title = document.getElementById("f-title");
const f_artist = document.getElementById("f-artist");
const queue = document.getElementById("queue");

const audio = document.getElementById("audio");

// ================= DATA (EXPANDED TO 3 ALBUMS) =================
const App = {
albums: [
{
title: "BULLY",
artist: "Kanye West",
img: "https://raw.githubusercontent.com/LucasTheMaker/movie/main/bully_cover.png",
tracks: [
{name: "KING", file: "KING_spotdown.org bully.mp3"},
{name: "THIS A MUST", file: "THIS A MUST_spotdown.org.mp3"}
]
},
{
title: "ye",
artist: "Kanye West",
img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
tracks: [
{name: "Yikes", file: "2. Yikes.mp3"}
]
},
{
title: "VULTURES 1",
artist: "Kanye West",
img: "https://upload.wikimedia.org/wikipedia/en/6/6b/Vultures_1_cover.jpg",
tracks: [
{name: "STARS", file: "STARS.mp3"},
{name: "CARNIVAL", file: "CARNIVAL.mp3"}
]
}
]
};

// ================= PLAYER =================
const Player = {
state: {
track: null,
album: null,
index: 0,
queue: [],
playing: false
},

BASE: "https://raw.githubusercontent.com/LucasTheMaker/Music/main/",

// safer file handling (NO SONG CHANGES)
url(file){
return this.BASE + file.split("/").map(encodeURIComponent).join("/");
},

play(track, album, index){
this.state.track = track;
this.state.album = album;
this.state.index = index;
this.state.queue = album.tracks;
this.state.playing = true;

const src = this.url(track.file);
console.log("Now playing:", src);

audio.src = src;
audio.load();

audio.play().catch(err=>{
console.error("Play failed:", err);
});

full.style.display = "block";

UI.renderMini();
UI.renderFull();
},

toggle(){
if(!audio.src) return;

if(audio.paused){
audio.play();
this.state.playing = true;
}else{
audio.pause();
this.state.playing = false;
}

UI.renderMini();
},

next(){
let i = this.state.index + 1;
if(i >= this.state.queue.length) i = 0;

this.play(this.state.queue[i], this.state.album, i);
}
};

audio.onended = () => Player.next();

// ================= UI =================
const UI = {

init(){
home.innerHTML = `
<h2>Listen Now</h2>
<div class="card" onclick="UI.openArtist()">
Kanye West Discography
</div>
`;
},

openArtist(){
home.innerHTML = "";

artist.innerHTML = `
<h2>Kanye West</h2>

${App.albums.map((a,i)=>`
<div class="album" onclick="UI.openAlbum(${i})">
<img src="${a.img}">
<div>
<div>${a.title}</div>
<div style="font-size:12px;color:#aaa">${a.artist}</div>
</div>
</div>
`).join("")}
`;
},

openAlbum(i){
artist.innerHTML = "";

const album = App.albums[i];

artist.innerHTML = `
<h2>${album.title}</h2>

${album.tracks.map((t,x)=>`
<div class="album" onclick="App.play(${i},${x})">
<div>${x+1}. ${t.name}</div>
</div>
`).join("")}
`;
},

renderMini(){
const s = Player.state;
if(!s.track) return;

mini.style.display = "flex";
m_title.innerText = s.track.name;
m_artist.innerText = `${s.album.title} • ${s.album.artist}`;
m_btn.innerText = s.playing ? "⏸" : "▶";
},

renderFull(){
const s = Player.state;
if(!s.track) return;

f_title.innerText = s.track.name;
f_artist.innerText = `${s.album.title} • ${s.album.artist}`;

queue.innerHTML = s.queue.map((t,i)=>`
<div style="opacity:${i===s.index?1:0.5}">
${t.name}
</div>
`).join("");
}
};

// ================= BRIDGE =================
window.App = {
albums: App.albums,
play(albumIndex, trackIndex){
const album = App.albums[albumIndex];
Player.play(album.tracks[trackIndex], album, trackIndex);
}
};

// ================= START =================
UI.init();
</script>

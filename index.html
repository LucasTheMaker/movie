<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LucasFlix - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; --gray: #a3a3a3; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 26px; font-weight: bold; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; font-size: 15px; margin-left: 40px; cursor: pointer; }

        .main-container { padding: 100px 50px 0; }
        .section-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; }

        /* Row containing the large focus card and the smaller ones */
        .focus-row { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 50px; }

        /* The Large Spider-Man Card */
        .hero-container { width: 750px; flex-shrink: 0; cursor: pointer; }
        .image-box { 
            width: 100%; 
            height: 420px; 
            border-radius: 6px; 
            overflow: hidden; 
            border: 2px solid #333;
            transition: 0.3s;
        }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-container:hover .image-box { border-color: white; transform: scale(1.02); }

        .hero-details { margin-top: 15px; }
        .meta { color: var(--gray); font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .description { font-size: 16px; line-height: 1.4; color: #ccc; max-width: 700px; }

        /* Action Buttons */
        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn { padding: 12px 28px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-play { background: white; color: black; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }

        /* The smaller cards on the right */
        .small-card { 
            width: 280px; 
            height: 420px; 
            border-radius: 6px; 
            background-size: cover; 
            background-position: center; 
            cursor: pointer; 
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .small-card:hover { transform: scale(1.05); border-color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">LUCASFLIX</a>
        <div class="nav-links">
            <span>Home</span>
            <span>Shows</span>
            <span>Movies</span>
        </div>
    </nav>

    <div class="main-container">
        <p class="section-title">My List</p>
        
        <div class="focus-row">
            <div class="hero-container" onclick="window.location.href='spiderman-2002.html'">
                <div class="image-box">
                    <img src="https://i.ebayimg.com/images/g/Mf0AAOSwRfxmXaGY/s-l1200.jpg" class="hero-img">
                </div>
                
                <div class="hero-details">
                    <div class="meta">Superheroes • 2002 • Movie • PG-13</div>
                    <div class="description">
                        After being bitten by a genetically-altered spider, Peter Parker gains superhuman strength and the spider-like ability to cling to any surface.
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-play">▶ Play</button>
                        <button class="btn btn-info">ⓘ More Info</button>
                    </div>
                </div>
            </div>

            <div class="small-card" style="background-image: url('https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e7602058-294c-474c-8975-571d701d596e/df6200l-d08e82a3-764f-4d4f-9e66-6b66a836858e.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9');">
            </div>

            <div class="small-card" style="background-image: url('https://image.tmdb.org/t/p/original/8G6678S1E8S1YCh6YI66Xy989.jpg');">
            </div>
        </div>
    </div>

</body>
</html>

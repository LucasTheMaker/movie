<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: 500; transition: 0.2s; }
        .nav-link.active { color: #fff; background: #222; border-left: 3px solid var(--apple-red); }

        /* Main View */
        .main-view { flex: 1; overflow-y: scroll; padding-bottom: 140px; position: relative; }
        .hero { 
            width: 100%; height: 40vh; 
            background: linear-gradient(to bottom, transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg');
            background-size: cover; background-position: center 20%; display: flex; align-items: flex-end; padding: 40px; 
        }

        .section-label { padding: 30px 40px 15px; font-size: 22px; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 0 40px; }
        .album-card { cursor: pointer; text-align: center; transition: transform 0.2s; }
        .album-card:active { transform: scale(0.95); }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Apple Music Style Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding-bottom: 120px; }
        .track-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: background 0.2s; }
        .track-row:active { background: #1a1a1a; }
        .track-number { color: #666; width: 30px; font-size: 14px; }
        .track-name { flex: 1; font-weight: 500; }

        /* Bottom Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 6000; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 300px; }
        .now-playing img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
        .song-info { overflow: hidden; }
        .song-info div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        audio { flex: 1; max-width: 500px; filter: invert(100%); margin-left: 20px; }
        
        @media (max-width: 768px) { .sidebar { display: none; } .hero { height: 35vh; padding: 20px; } .grid { padding: 0 20px; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:2px; margin-bottom:40px;">LUCAS HUB</h2>
        <div class="nav-link active">🎵 Music</div>
        <div class="nav-link" onclick="window.location.href='IronMan-2008.html'">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <div class="hero">
            <h1 style="font-size: clamp(38px, 6vw, 72px); margin: 0; font-weight: 900;">Kanye West</h1>
        </div>
        <div class="section-label">Your Archive</div>
        <div class="grid" id="album-grid"></div>
    </main>

    <div id="album-view" class="overlay">
        <div onclick="closeAlbum()" style="padding: 20px; color:var(--apple-red); cursor:pointer; font-weight:bold;">‹ Library</div>
        <div id="album-header" style="text-align:center; padding: 20px;"></div>
        <div id="tracklist-container"></div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="p-img" src="https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png">
            <div class="song-info">
                <div id="p-title" style="font-weight: bold; font-size: 14px;">Select a track</div>
                <div id="p-alb" style="font-size: 12px; color: #888;">Kanye West</div>
            </div>
        </div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        const GITHUB_BASE = "https://raw.githubusercontent.com/LucasTheMaker/Music/main/";

        const albums = [
            {
                title: "BULLY", year: 2026, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png",
                tracks: [
                    { name: "KING", file: "KING_spotdown.org.mp3" },
                    { name: "SISTERS AND BROTHERS", file: "SISTERS AND BROTHERS_spotdown.org.mp3" },
                    { name: "FATHER (feat. Travis Scott)", file: "FATHER (feat. Travis Scott)_spotdown.org.mp3" },
                    { name: "PREACHER MAN", file: "PREACHER MAN.mp3" },
                    { name: "BEAUTY AND THE BEAST", file: "BEAUTY AND THE BEAST.mp3" }
                ]
            },
            {
                title: "Vultures 1", year: 2024, img: "https://raw.githubusercontent.com/playermatrix/assets/main/vultures1.jpg",
                tracks: [
                    { name: "STARS", file: "STARS_spotdown.org.mp3" },
                    { name: "KEYS TO MY LIFE", file: "KEYS TO MY LIFE_spotdown.org.mp3" },
                    { name: "PAID", file: "PAID.mp3" },
                    { name: "TALKING", file: "TALKING_spotdown.org.mp3" },
                    { name: "BACK TO ME", file: "BACK TO ME_spotdown.org.mp3" },
                    { name: "HOODRAT", file: "HOODRAT_spotdown.org.mp3" },
                    { name: "DO IT", file: "DO IT_spotdown.org.mp3" },
                    { name: "PAPERWORK", file: "PAPERWORK_spotdown.org.mp3" },
                    { name: "BURN", file: "BURN_spotdown.org.mp3" },
                    { name: "FUK SUMN", file: "FUK SUMN_spotdown.org.mp3" },
                    { name: "VULTURES", file: "VULTURES_spotdown.org.mp3" },
                    { name: "CARNIVAL", file: "CARNIVAL_spotdown.org.mp3" },
                    { name: "BEG FORGIVENESS", file: "BEG FORGIVENESS_spotdown.org.mp3" },
                    { name: "PROBLEMATIC", file: "PROBLEMATIC_spotdown.org.mp3" },
                    { name: "KING", file: "KING_spotdown.org.mp3" }
                ]
            },
            {
                title: "Ye", year: 2018, img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
                tracks: [
                    { name: "I Thought About Killing You", file: "1. I Thought About Killing You.mp3" },
                    { name: "Yikes", file: "2. Yikes.mp3" },
                    { name: "All Mine", file: "3. All Mine.mp3" },
                    { name: "Wouldn't Leave", file: "4. Wouldn't Leave.mp3" },
                    { name: "No Mistakes", file: "5. No Mistakes.mp3" },
                    { name: "Ghost Town", file: "6. Ghost Town.mp3" },
                    { name: "Violent Crimes", file: "7. Violent Crimes.mp3" }
                ]
            }
        ];

        function init() {
            const grid = document.getElementById('album-grid');
            albums.forEach((alb, i) => {
                grid.innerHTML += `<div class="album-card" onclick="openAlbum(${i})"><img src="${alb.img}"><p><b>${alb.title}</b></p></div>`;
            });
        }

        function openAlbum(index) {
            const alb = albums[index];
            document.getElementById('album-header').innerHTML = `<img src="${alb.img}" style="width:200px; border-radius:12px; margin-bottom:15px;"><h1>${alb.title}</h1><p style="color:#666">${alb.year}</p>`;
            document.getElementById('tracklist-container').innerHTML = alb.tracks.map((t, i) => `
                <div class="track-row" onclick="playSong('${GITHUB_BASE}${t.file}', '${t.name.replace(/'/g, "\\'")}', '${alb.img}', '${alb.title}')">
                    <span class="track-number">${i + 1}</span>
                    <span class="track-name">${t.name}</span>
                    <span style="color:var(--apple-red)">▶</span>
                </div>`).join('');
            document.getElementById('album-view').style.display = 'block';
        }

        function playSong(url, name, img, alb) {
            const audio = document.getElementById('main-audio');
            audio.src = encodeURI(url);
            document.getElementById('p-title').innerText = name;
            document.getElementById('p-alb').innerText = alb;
            document.getElementById('p-img').src = img;
            audio.play();
        }

        function closeAlbum() { document.getElementById('album-view').style.display = 'none'; }
        init();
    </script>
</body>
</html>

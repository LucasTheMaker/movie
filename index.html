<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | Music</title>
    <style>
        :root { --apple-red: #fa233c; --bg: #000; --sidebar: #121212; --card-bg: #1c1c1e; --text-gray: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #2c2c2e; padding: 30px 20px; flex-shrink: 0; }
        .nav-item { padding: 10px 15px; color: #fff; border-radius: 8px; margin-bottom: 4px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: #2c2c2e; }
        .nav-item span { color: var(--apple-red); font-size: 18px; }

        /* --- MAIN CONTENT --- */
        .main-view { flex: 1; overflow-y: auto; padding-bottom: 150px; }
        .hero { height: 40vh; background: linear-gradient(to bottom, rgba(0,0,0,0), #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }
        .section-label { padding: 30px 40px 10px; font-size: 22px; font-weight: 700; }
        .scroller { display: flex; overflow-x: auto; gap: 20px; padding: 0 40px 30px; scrollbar-width: none; }
        .card { min-width: 180px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- OVERLAY & DESCRIPTION --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .album-header-content { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 20px; }
        .album-desc { max-width: 600px; color: var(--text-gray); font-size: 14px; line-height: 1.5; margin: 20px 0; }
        .action-btns { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-play { background: #fff; color: #000; border: none; padding: 12px 35px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-shuffle { background: #2c2c2e; color: #fff; border: none; padding: 12px 35px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .track-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 40px; cursor: pointer; transition: 0.2s; border-radius: 10px; margin: 0 20px; }
        .track-row:hover { background: #1c1c1e; }
        .track-row.playing { color: var(--apple-red); }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 3000; }
        .track-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        .track-info img { width: 50px; height: 50px; border-radius: 4px; }
        audio { flex: 1; max-width: 500px; filter: invert(1); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .hero h1 { font-size: 40px !important; }
            .action-btns { width: 100%; flex-direction: column; }
            .player-bar { flex-direction: column; height: auto; padding: 10px; }
            .track-info { width: 100%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="color: var(--apple-red); font-size: 20px; font-weight: 900; margin-bottom: 40px;">Lucas Hub</h2>
        <div class="nav-item active"><span>🏠</span> Music</div>
        <div class="nav-item" onclick="window.location.href='movie.html'"><span>🎬</span> Movies</div>
    </nav>

    <main class="main-view">
        <div class="hero">
            <h1 style="font-size: 70px; margin: 0; font-weight: 900;">Kanye West</h1>
        </div>
        <div class="section-label">Discography</div>
        <div class="scroller" id="album-row"></div>
    </main>

    <div id="overlay" class="overlay">
        <div style="padding: 20px; position: sticky; top: 0; background: rgba(0,0,0,0.8); z-index: 100;">
            <span onclick="closeOverlay()" style="cursor:pointer; font-weight:bold; color:var(--apple-red);">← Back</span>
        </div>
        <div class="album-header-content" id="overlay-header"></div>
        <div id="track-list" style="max-width: 800px; margin: 0 auto; padding-bottom: 150px;"></div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="p-img" src="">
            <div>
                <div id="p-title" style="font-weight:bold; font-size:14px;">Not Playing</div>
                <div id="p-album" style="font-size:11px; color:var(--text-gray);">Stream active</div>
            </div>
        </div>
        <audio id="player-core" controls></audio>
    </div>

    <script>
        const githubUser = "lucasthemaker"; 
        const repo = "Music"; 
        const baseRawUrl = `https://raw.githubusercontent.com/${githubUser}/${repo}/main/`;

        const albums = [
            { 
                title: "Ye", year: 2018, img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
                desc: "Ye is the eighth studio album by Kanye West. It features a raw, personal look into his mental health and family life, recorded entirely at his ranch in Wyoming.",
                tracks: [
                    { name: "I Thought About Killing You", file: "I%20Thought%20About%20Killing%20You.mp3" },
                    { name: "Yikes", file: "2.%20Yikes.mp3" },
                    { name: "All Mine", file: "3.%20All%20Mine.mp3" },
                    { name: "Wouldn't Leave", file: "4.%20Wouldn't%20Leave.mp3" },
                    { name: "No Mistakes", file: "5.%20No%20Mistakes.mp3" },
                    { name: "Ghost Town", file: "6.%20Ghost%20Town.mp3" },
                    { name: "Violent Crimes", file: "7.%20Violent%20Crimes.mp3" }
                ] 
            },
            { 
                title: "Graduation", year: 2007, img: "https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg",
                desc: "The album that changed hip-hop forever, blending stadium rock and electronic influences with soulful rap.",
                tracks: [{name: "Good Morning", file: "01%20Good%20Morning.mp3"}, {name: "Stronger", file: "02%20Stronger.mp3"}] 
            }
        ];

        let currentAlbumTracks = [];
        let currentTrackIndex = 0;

        function init() {
            const row = document.getElementById('album-row');
            albums.forEach(a => {
                row.innerHTML += `
                    <div class="card" onclick="openAlb('${a.title}')">
                        <img src="${a.img}">
                        <div style="font-weight:600;">${a.title}</div>
                        <div style="color:var(--text-gray); font-size:13px;">${a.year}</div>
                    </div>`;
            });
        }

        function openAlb(t) {
            const a = albums.find(x => x.title === t);
            currentAlbumTracks = a.tracks;
            
            document.getElementById('overlay-header').innerHTML = `
                <img src="${a.img}" style="width:250px; border-radius:12px;">
                <h1 style="font-size: 40px; margin: 20px 0 5px;">${a.title}</h1>
                <p style="color:var(--apple-red); font-weight:700;">KANYE WEST</p>
                <p class="album-desc">${a.desc}</p>
                <div class="action-btns">
                    <button class="btn-play" onclick="playAlbum(0)"><span>▶</span> Play</button>
                    <button class="btn-shuffle" onclick="playAlbum(Math.floor(Math.random()*currentAlbumTracks.length))">Shuffle</button>
                </div>
            `;
            
            renderTracklist(a);
            document.getElementById('overlay').style.display = 'block';
        }

        function renderTracklist(a) {
            document.getElementById('track-list').innerHTML = a.tracks.map((tr, i) => `
                <div class="track-row" id="track-${i}" onclick="playTrack(${i}, '${a.img}', '${a.title}')">
                    <span><b style="color:#444; margin-right:15px;">${i+1}</b> ${tr.name}</span>
                    <span>▶</span>
                </div>
            `).join('');
        }

        function playTrack(index, img, albTitle) {
            currentTrackIndex = index;
            const track = currentAlbumTracks[index];
            const audio = document.getElementById('player-core');
            
            audio.src = baseRawUrl + track.file;
            document.getElementById('p-title').innerText = track.name;
            document.getElementById('p-album').innerText = albTitle;
            document.getElementById('p-img').src = img;
            
            // Highlight active track
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            const row = document.getElementById(`track-${index}`);
            if(row) row.classList.add('playing');

            audio.play();
        }

        // Play album from beginning logic
        function playAlbum(startIndex) {
            const activeAlb = albums.find(a => a.tracks === currentAlbumTracks);
            playTrack(startIndex, activeAlb.img, activeAlb.title);
        }

        // Auto-play next track
        document.getElementById('player-core').onended = function() {
            if (currentTrackIndex < currentAlbumTracks.length - 1) {
                const activeAlb = albums.find(a => a.tracks === currentAlbumTracks);
                playTrack(currentTrackIndex + 1, activeAlb.img, activeAlb.title);
            }
        };

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>

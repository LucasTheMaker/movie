<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card-bg: #181818; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:active { transform: scale(0.96); opacity: 0.8; }

        /* NAVIGATION */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; color: #888; border-radius: 8px; margin-bottom: 5px; font-weight: 500; }
        .nav-item.active { color: #fff; background: #222; border-left: 3px solid var(--apple-red); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.9); backdrop-filter: blur(20px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 12px 0 30px; z-index: 1000; }

        /* MAIN CONTENT */
        .main-view { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .hero { 
            height: 40vh; background: linear-gradient(to bottom, transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg');
            background-size: cover; background-position: center 20%; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;
        }

        .pc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 20px 40px; }
        .album-card { background: var(--card-bg); padding: 15px; border-radius: 12px; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; margin-bottom: 12px; }

        /* TRACKLIST PLAYER */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; overflow-y: auto; }
        .track-row { display: flex; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #222; color: #eee; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .pc-grid { grid-template-columns: repeat(2, 1fr); padding: 15px; }
            .hero { height: 30vh; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#555; letter-spacing:2px; margin-bottom:30px;">LIBRARY</h2>
        <div class="nav-item active clickable" onclick="switchTab('music')">🎵 Music</div>
        <div class="nav-item clickable" onclick="switchTab('movies')">🎬 Movies</div>
        <div class="nav-item clickable">🔍 Search</div>
    </nav>

    <main class="main-view">
        <section id="music" class="tab-content active">
            <div class="hero">
                <h1 style="font-size: 48px; margin:0;">Kanye West</h1>
                <p style="color:#aaa;">Discography & Tracklists</p>
            </div>
            <div class="pc-grid" id="album-list"></div>
        </section>

        <section id="movies" class="tab-content">
            <div style="padding: 40px;">
                <h1>Movies</h1>
                <p style="color:#888;">Your Cinema Collection</p>
                <div class="pc-grid">
                    <div class="album-card">
                        <img src="https://m.media-amazon.com/images/M/MV5BMjIyNTQ5NjQ1OV5BMl5BanBnXkFtZTcwNjM1MzgxMQ@@._V1_.jpg" alt="Runaway">
                        <p style="font-weight:bold; margin:0;">Runaway (2010)</p>
                        <p style="font-size:12px; color:#666;">Musical/Short</p>
                    </div>
                    </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="clickable" onclick="switchTab('music')">🎵<br><small>Music</small></div>
        <div class="clickable" onclick="switchTab('movies')">🎬<br><small>Movies</small></div>
        <div class="clickable">🔍<br><small>Search</small></div>
    </nav>

    <div id="player" class="overlay">
        <div style="padding: 20px; position: sticky; top: 0; background: rgba(0,0,0,0.9);"><span class="clickable" onclick="closePlayer()" style="color:var(--apple-red); font-weight:bold;">✕ Back</span></div>
        <div id="player-content"></div>
    </div>

    <script>
        const albums = [
            { 
                title: "BULLY", year: 2026, runtime: "42:10", label: "YZY / Independent",
                img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png",
                tracks: ["PUNCH DRUNK", "WHATEVER WORKS", "MAMA'S FAVORITE", "BULLY", "PREACHER MAN", "BEAUTY AND THE BEAST"]
            },
            { 
                title: "The College Dropout", year: 2004, runtime: "72:32", label: "Roc-A-Fella / Def Jam",
                img: "https://upload.wikimedia.org/wikipedia/en/a/a3/Kanyewest_collegedropout.jpg",
                tracks: ["Intro", "We Don't Care", "All Falls Down", "Spaceship", "Jesus Walks", "Never Let Me Down"]
            }
            // Add more albums here following this pattern
        ];

        function init() {
            const list = document.getElementById('album-list');
            albums.forEach(alb => {
                list.innerHTML += `
                <div class="album-card clickable" onclick="openPlayer('${alb.title}')">
                    <img src="${alb.img}">
                    <p class="album-title">${alb.title}</p>
                    <p style="font-size:12px; color:#666;">${alb.year}</p>
                </div>`;
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function openPlayer(title) {
            const alb = albums.find(a => a.title === title);
            const player = document.getElementById('player');
            document.getElementById('player-content').innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <img src="${alb.img}" style="width:250px; border-radius:15px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
                    <h1 style="margin-top:20px;">${alb.title}</h1>
                    <p style="color:#888;">${alb.label} • ${alb.runtime}</p>
                </div>
                ${alb.tracks.map((t, i) => `
                    <div class="track-row">
                        <span><span style="color:#444; margin-right:15px;">${i+1}</span> ${t}</span>
                        <span style="color:#555;">...</span>
                    </div>
                `).join('')}
            `;
            player.style.display = 'block';
        }

        function closePlayer() { document.getElementById('player').style.display = 'none'; }

        init();
    </script>
</body>
</html>

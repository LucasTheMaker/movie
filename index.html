<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Movies - Spider-Man (2002)</title>
    <style>
        :root { --red: #e50914; --text: #fff; --gray: #888; }
        
        body { 
            background: #000; 
            color: var(--text); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Responsive Background: Switching logic based on orientation/width */
        
        /* Mobile Mode (Portrait or narrow screen) */
        @media screen and (orientation: portrait), screen and (max-width: 768px) {
            .bg {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                /* Gradient logic on mobile: bottom-up so text is readable */
                background: linear-gradient(0deg, rgba(0,0,0,1) 15%, transparent 60%),
                            url('image_6.png'); /* YOUR VERTICAL MOBILE IMAGE */
                background-size: cover; background-position: center; z-index: -1;
            }
            .content { padding-top: 15vh; padding-left: 5%; } /* Offset for mobile view */
        }

        /* Desktop Mode (Landscape/Wide screens) */
        @media screen and (orientation: landscape) and (min-width: 769px) {
            .bg {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                /* Gradient logic on desktop: left-to-right (from image_7.png itself) */
                background: linear-gradient(90deg, rgba(0,0,0,0.9) 20%, transparent 100%),
                            url('image_7.png'); /* YOUR WIDE DESKTOP IMAGE */
                background-size: cover; background-position: center 20%; z-index: -1;
            }
            .content { padding-left: 50px; } /* Alignment for desktop */
        }

        /* Rest of the UI styles remain the same for consistency */
        .content { z-index: 5; }
        h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .description { max-width: 450px; color: #ccc; line-height: 1.5; margin: 15px 0; font-size: 1rem; }
        
        .play-btn { 
            background: #fff; color: #000; padding: 12px 35px; font-weight: bold; 
            cursor: pointer; border: none; border-radius: 4px; font-size: 1rem; transition: 0.2s;
        }
        .play-btn:hover { background: #e5e5e5; transform: scale(1.05); }

        .subtitle { margin-top: 40px; font-size: 0.75rem; color: var(--gray); letter-spacing: 2px; text-transform: uppercase;}
        .row { display: flex; gap: 12px; margin-top: 15px; }
        
        .card { 
            width: 110px; height: 165px; border: 2px solid #333; cursor: pointer; 
            background-size: cover; background-position: center; border-radius: 6px; transition: 0.3s; 
        }
        .card:hover { border-color: #fff; transform: scale(1.05); }
        /* The Red box 'current' fix: ensured images are high-quality, direct links */
        .current { border-color: var(--red); box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }
        
        .back-link { display: inline-block; margin-top: 30px; color: #666; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="content">
        <p style="color: var(--red); font-weight: bold; margin-bottom: 5px;">MARVEL</p>
        <h1>SPIDER-MAN</h1>
        <p class="description">Average teenager Peter Parker is transformed into an extraordinary super hero after he is accidentally bitten by a radioactive spider.</p>
        
        <button class="play-btn">▶ Watch Now</button>
        
        <p class="subtitle">The Trilogy Collection</p>
        <div class="row">
            <div class="card current" onclick="window.location.href='spiderman-2002.html'" 
                 style="background-image: url('https://m.media-amazon.com/images/M/MV5BMzY2OTgxOTE3OF5BMl5BanBnXkFtZTYwMTY3OTY3._V1_.jpg');"></div>
            
            <div class="card" onclick="window.location.href='spiderman-2.html'" 
                 style="background-image: url('https://m.media-amazon.com/images/M/MV5BMzY2OTgxOTE3OF5BMl5BanBnXkFtZTcwMTU0NTIzMw@@._V1_.jpg');"></div>
            
            <div class="card" onclick="window.location.href='spiderman-3.html'" 
                 style="background-image: url('https://m.media-amazon.com/images/M/MV5BYTNjYWE0ZDAtZDM1NS00ZTI0LTgwYjktYzE1OTFhY2E3N2FkXkEyXkFqcGdeQXVyMTEyMjM2NDc2._V1_.jpg');"></div>
        </div>
        
        <a href="index.html" class="back-link">← Home</a>
    </div>
</body>
</html>

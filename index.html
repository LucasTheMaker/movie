<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Films & Audio</title>
    <style>
        :root { --red: #e50914; --accent: #fa243c; --bg: #000; --gray: #888; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 150px; overflow-x: hidden; }

        /* Navigation Logic - Hides sections not in use */
        .page { display: none; }
        .active-page { display: block; }

        /* Headers */
        .header { padding: 40px 20px 10px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, #111, #000); }
        .logo-text { font-size: 26px; font-weight: bold; color: var(--red); letter-spacing: 1px; }

        /* Movie Styles */
        .section-title { font-size: 18px; font-weight: bold; padding: 25px 20px 12px; }
        .row { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
        .row::-webkit-scrollbar { display: none; }
        .card { min-width: 130px; height: 195px; border-radius: 6px; background-size: cover; background-position: center; border: 1px solid #222; }

        /* Music Styles */
        .album-list { padding: 0 20px; }
        .album-row { display: flex; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .art-thumb { width: 70px; height: 70px; border-radius: 6px; background-size: cover; background-position: center; flex-shrink: 0; border: 1px solid #333; }
        .info { flex-grow: 1; }
        .features { font-size: 10px; color: var(--accent); font-weight: bold; }

        /* Floating Player Bar */
        .player-bar {
            position: fixed; bottom: 85px; left: 10px; right: 10px;
            height: 60px; background: rgba(25,25,25,0.98); backdrop-filter: blur(15px);
            border-radius: 12px; display: flex; align-items: center; padding: 0 15px;
            justify-content: space-between; border: 1px solid #444; z-index: 1000;
        }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1001; }
        .nav-item { text-align: center; font-size: 10px; color: #666; cursor: pointer; }
        .nav-item.active { color: white; }
    </style>
</head>

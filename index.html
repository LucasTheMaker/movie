<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --card: #111; --nav-bg: rgba(15, 15, 15, 0.95); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 140px; overflow-x: hidden; }
        
        /* Layout */
        .hero { height: 35vh; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 20px; }
        .section-label { padding: 20px; font-size: 22px; font-weight: 800; }
        
        /* Album Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 0 20px; }
        .album-card { cursor: pointer; transition: 0.2s; }
        .album-card:active { transform: scale(0.95); }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .album-title { font-weight: 700; font-size: 14px; margin: 0; }
        .album-year { font-size: 12px; color: #666; margin: 0; }

        /* Tracklist Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .track-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .track-row:active { background: #111; }
        
        /* Fixed Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .now-playing { font-size: 13px; font-weight: 700; color: var(--apple-red); text-align: center; }
        audio { width: 100%; filter: invert(100%); height: 35px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-size: 42px; margin: 0;">Kanye West</h1>
    </div>

    <div class="section-label">Your Albums</div>
    <div class="grid" id="main-grid">
        </div>

    <div id="album-view" class="overlay">
        <div onclick="closeAlbum()" style="color:var(--apple-red); cursor:pointer; font-weight:bold; margin-bottom:20px; font-size:18px;">‹ Library</div>
        <div id="album-header" style="text-align:center; margin-bottom:30px;"></div>
        <div id="tracklist-container" style="max-width: 600px; margin: auto;"></div>
    </div>

    <div class="player-bar">
        <div id="p-title" class="now-playing">Select a track to play</div>
        <audio id="main-audio" controls></audio>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Music Style Kanye</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, Arial;
background:#000;
color:#fff;
overflow:hidden;
}

/* PAGES */
.page{
display:none;
height:100vh;
overflow:auto;
padding:20px;
}
.page.active{display:block;}

/* HOME */
.artistTile{
width:100%;
height:220px;
border-radius:25px;
background:url('https://upload.wikimedia.org/wikipedia/commons/0/0e/Kanye_West_at_2019_Met_Gala_%28cropped%29.jpg') center/cover;
display:flex;
align-items:flex-end;
padding:15px;
font-size:22px;
font-weight:700;
cursor:pointer;
}

/* ARTIST HEADER */
.header{
height:260px;
border-radius:20px;
background:url('https://upload.wikimedia.org/wikipedia/commons/0/0e/Kanye_West_at_2019_Met_Gala_%28cropped%29.jpg') center/cover;
display:flex;
align-items:flex-end;
padding:20px;
font-size:28px;
font-weight:800;
}

/* ALBUM GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.albumCard{
background:#111;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.albumCard img{
width:100%;
height:140px;
object-fit:cover;
}

.albumCard div{
padding:10px;
font-size:14px;
}

/* TRACK LIST */
.track{
padding:15px;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
cursor:pointer;
}

/* PLAYER */
#player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(20px);
padding:15px;
box-sizing:border-box;
border-top:1px solid rgba(255,255,255,0.1);
}

#now{
font-size:14px;
color:#fff;
}

.controls{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
background:rgba(255,255,255,0.1);
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active"></div>

<!-- ARTIST -->
<div id="artist" class="page"></div>

<!-- ALBUM -->
<div id="album" class="page"></div>

<!-- PLAYER -->
<div id="player">
<div id="now">Nothing playing</div>
<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>

// ================= DATA =================
const albums = [
{
name:"BULLY",
img:"https://raw.githubusercontent.com/LucasTheMaker/movie/main/bully_cover.png",
tracks:[
{name:"KING",file:"KING_spotdown.org bully.mp3"},
{name:"THIS A MUST",file:"THIS A MUST_spotdown.org.mp3"}
]
},
{
name:"ye",
img:"https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
tracks:[
{name:"Yikes",file:"2. Yikes.mp3"}
]
},
{
name:"VULTURES 1",
img:"https://upload.wikimedia.org/wikipedia/en/6/6b/Vultures_1_cover.jpg",
tracks:[
{name:"STARS",file:"STARS.mp3"},
{name:"CARNIVAL",file:"CARNIVAL.mp3"}
]
}
];

// ================= STATE =================
let currentAlbum=null;
let currentIndex=0;

// ================= AUDIO =================
const audio=document.getElementById("audio");
const now=document.getElementById("now");

// ================= NAV =================
function showHome(){
document.getElementById("home").classList.add("active");
document.getElementById("artist").classList.remove("active");

document.getElementById("home").innerHTML=`
<h2>Browse</h2>
<div class="artistTile" onclick="openArtist()">
Kanye West
</div>
`;
}

function openArtist(){
document.getElementById("home").classList.remove("active");
document.getElementById("artist").classList.add("active");

document.getElementById("artist").innerHTML=`
<div class="header">Kanye West</div>

<div class="grid">
${albums.map((a,i)=>`
<div class="albumCard" onclick="openAlbum(${i})">
<img src="${a.img}">
<div>${a.name}</div>
</div>
`).join("")}
</div>
`;
}

function openAlbum(i){
currentAlbum=albums[i];

document.getElementById("artist").classList.remove("active");
document.getElementById("album").classList.add("active");

document.getElementById("album").innerHTML=`
<h2>${currentAlbum.name}</h2>
${currentAlbum.tracks.map((t,x)=>`
<div class="track" onclick="play(${x})">
<div>${t.name}</div>
</div>
`).join("")}
`;
}

// ================= PLAYER =================
function play(i){
currentIndex=i;
const t=currentAlbum.tracks[i];

audio.src=t.file;
audio.play();

now.innerText=currentAlbum.name+" - "+t.name;
}

function toggle(){
if(audio.paused) audio.play();
else audio.pause();
}

function next(){
if(!currentAlbum) return;
currentIndex++;
if(currentIndex>=currentAlbum.tracks.length) currentIndex=0;
play(currentIndex);
}

function prev(){
if(!currentAlbum) return;
currentIndex--;
if(currentIndex<0) currentIndex=0;
play(currentIndex);
}

// ================= INIT =================
showHome();

</script>

</body>
</html>

<script>
// =======================
// 🧠 APP CORE
// =======================

const GITHUB_BASE = "https://raw.githubusercontent.com/LucasTheMaker/Music/main/";
const audio = document.getElementById("audio-core");

// DEVICE DETECTION
const Device = {
    isMobile: () => window.innerWidth < 768
};

// =======================
// 🎵 PLAYER ENGINE
// =======================

const Player = {
    state: {
        currentTrack: null,
        currentAlbum: null,
        queue: [],
        index: 0,
        isPlaying: false,
        shuffle: false,
        repeat: "off" // off | one | all
    },

    getURL(file) {
        return GITHUB_BASE + encodeURIComponent(file);
    },

    play(track, album, index) {
        audio.pause();
        audio.currentTime = 0;

        audio.src = this.getURL(track.file);

        this.state.currentTrack = track;
        this.state.currentAlbum = album;
        this.state.index = index;
        this.state.isPlaying = true;

        audio.play();
        UI.updateMiniPlayer();
    },

    toggle() {
        if (!this.state.currentTrack) return;

        if (audio.paused) {
            audio.play();
            this.state.isPlaying = true;
        } else {
            audio.pause();
            this.state.isPlaying = false;
        }

        UI.updateMiniPlayer();
    },

    next() {
        const { currentAlbum, index, shuffle } = this.state;
        if (!currentAlbum) return;

        let nextIndex;

        if (shuffle) {
            nextIndex = Math.floor(Math.random() * currentAlbum.tracks.length);
        } else {
            nextIndex = index + 1;
        }

        if (nextIndex >= currentAlbum.tracks.length) {
            if (this.state.repeat === "all") nextIndex = 0;
            else return;
        }

        this.play(currentAlbum.tracks[nextIndex], currentAlbum, nextIndex);
    }
};

// AUTO NEXT
audio.addEventListener("ended", () => {
    if (Player.state.repeat === "one") {
        Player.play(
            Player.state.currentTrack,
            Player.state.currentAlbum,
            Player.state.index
        );
    } else {
        Player.next();
    }
});

// =======================
// 🎨 UI SYSTEM
// =======================

const UI = {
    updateMiniPlayer() {
        const { currentTrack, currentAlbum, isPlaying } = Player.state;
        if (!currentTrack) return;

        document.getElementById("m-title").innerText = currentTrack.name;
        document.getElementById("m-artist").innerText = currentAlbum.artist;
        document.getElementById("m-art").src = currentAlbum.img;

        document.getElementById("mini-p").style.display = "flex";
        document.getElementById("m-play-btn").innerText = isPlaying ? "⏸" : "▶️";
    },

    openAlbum(i) {
        App.currentAlbumIndex = i;
        const alb = App.albums[i];

        document.getElementById("album-header").innerHTML = `
            <img src="${alb.img}" style="width:230px; border-radius:20px;">
            <h1>${alb.title}</h1>
            <p style="color:#ff3b30;">${alb.artist}</p>
        `;

        document.getElementById("track-list").innerHTML =
            alb.tracks.map((t, idx) =>
                `<div class="track-row" onclick="App.play(${idx})">
                    <span>${idx + 1}</span>${t.name}
                </div>`
            ).join("");

        document.getElementById("album-overlay").style.display = "block";

        // MOBILE VS DESKTOP BEHAVIOR
        if (Device.isMobile()) {
            document.getElementById("album-overlay").style.transform = "translateY(0)";
        }
    },

    closeAlbum() {
        const overlay = document.getElementById("album-overlay");

        if (Device.isMobile()) {
            overlay.style.transform = "translateY(100%)";
            setTimeout(() => overlay.style.display = "none", 300);
        } else {
            overlay.style.display = "none";
        }
    }
};

// =======================
// 📀 APP DATA + CONTROL
// =======================

const App = {
    currentAlbumIndex: 0,

    albums: [
        {
            title: "BULLY",
            artist: "Kanye West",
            img: "https://raw.githubusercontent.com/LucasTheMaker/movie/main/bully_cover.png",
            tracks: [
                { name: "KING", file: "KING_spotdown.org bully.mp3" },
                { name: "THIS A MUST", file: "THIS A MUST_spotdown.org.mp3" }
            ]
        },
        {
            title: "ye",
            artist: "Kanye West",
            img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
            tracks: [
                { name: "Yikes", file: "2. Yikes.mp3" }
            ]
        }
    ],

    play(idx) {
        const album = this.albums[this.currentAlbumIndex];
        Player.play(album.tracks[idx], album, idx);
    },

    init() {
        const list = document.getElementById("recent-list");

        this.albums.forEach((alb, i) => {
            list.innerHTML += `
                <div class="recent-item" onclick="UI.openAlbum(${i})">
                    <img src="${alb.img}">
                    <p>${alb.title}</p>
                </div>
            `;
        });
    }
};

// =======================
// 🎮 GLOBAL HOOKS
// =======================

function togglePlay() { Player.toggle(); }
function openAlbum(i) { UI.openAlbum(i); }
function closeAlbum() { UI.closeAlbum(); }

// =======================
// 🚀 INIT
// =======================

App.init();
</script>

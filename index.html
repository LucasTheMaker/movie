<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goat Movies - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 26px; font-weight: bold; text-decoration: none; text-transform: uppercase; }
        .main-container { padding: 100px 50px 50px; }
        .section-title { font-size: 22px; font-weight: bold; margin: 40px 0 20px 0; }
        .featured-row { display: flex; gap: 15px; align-items: flex-start; }
        .hero-container { width: 700px; flex-shrink: 0; cursor: pointer; color: white; text-decoration: none; }
        .hero-box { width: 100%; height: 400px; border-radius: 6px; overflow: hidden; border: 2px solid #333; transition: 0.3s; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-container:hover .hero-box { border-color: white; transform: scale(1.01); }
        .vertical-card { width: 280px; height: 400px; border-radius: 6px; background-size: cover; background-position: center; cursor: pointer; transition: 0.3s; border: 2px solid #333; flex-shrink: 0; }
        .vertical-card:hover { transform: scale(1.05); border-color: white; }
        .btn { padding: 10px 25px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; background: white; color: black; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo">GOAT MOVIES</a></nav>
    <div class="main-container">
        <p class="section-title">My List</p>
        <div class="featured-row">
            <div class="hero-container" onclick="window.location.href='spiderman-2002.html'">
                <div class="hero-box"><img src="https://i.ebayimg.com/images/g/Mf0AAOSwRfxmXaGY/s-l1200.jpg" class="hero-img"></div>
                <div class="hero-details"><button class="btn">▶ Play Spider-Man</button></div>
            </div>

            <div class="vertical-card" onclick="window.location.href='IronMan-2008.html'" style="background-image: url('https://m.media-amazon.com/images/M/MV5BMTczNTI2ODUwOF5BMl5BanBnXkFtZTcwMTU0NTIzMw@@._V1_.jpg');"></div>
        </div>
    </div>
</body>
</html>

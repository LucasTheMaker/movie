<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
}

.page{display:none;padding:15px;}
.page.active{display:block;}

/* HERO */
.hero{
height:300px;
position:relative;
overflow:hidden;
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}
.hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:100px;
background:linear-gradient(transparent,#000);
}
.heroName{
position:absolute;
bottom:20px;
left:15px;
font-size:30px;
font-weight:800;
}

/* SCROLL ROW */
.row{
display:flex;
gap:12px;
overflow-x:auto;
}

.card{
min-width:140px;
cursor:pointer;
}
.card img{
width:140px;
height:140px;
border-radius:12px;
}

/* SONG LIST */
.song{
display:flex;
align-items:center;
gap:10px;
padding:12px 0;
border-bottom:1px solid #111;
cursor:pointer;
}
.song img{
width:45px;
height:45px;
border-radius:8px;
}

/* PLAYER */
#player{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:rgba(40,40,40,0.9);
border-radius:18px;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

#player img{
width:45px;
height:45px;
border-radius:8px;
}

.controls button{
background:none;
border:none;
color:#fff;
font-size:18px;
}
</style>
</head>

<body>

<div id="home" class="page active"></div>
<div id="artist" class="page"></div>
<div id="album" class="page"></div>

<div id="player">
<img id="cover">
<div>
<div id="title">Nothing playing</div>
<div style="color:#aaa;font-size:12px;">Kanye West</div>
</div>
<div class="controls">
<button onclick="togglePlay()">⏯</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>

// DATA
const albums=[{
name:"BULLY",
img:"https://raw.githubusercontent.com/LucasTheMaker/movie/main/bully_cover.png",
tracks:[
{name:"KING",file:"music/king.mp3"},
{name:"THIS A MUST",file:"music/this_a_must.mp3"},
{name:"FATHER",file:"music/father.mp3"},
{name:"ALL THE LOVE",file:"music/all_the_love.mp3"},
{name:"PUNCH DRUNK",file:"music/punch_drunk.mp3"}
]
}];

let currentAlbum=null;
let currentIndex=0;

const audio=document.getElementById("audio");

// NAV
function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

// HOME
function home(){
show("home");
home.innerHTML=`
<h1>Home</h1>

<h2>Artists</h2>
<div class="row">
<div class="card" onclick="artistPage()">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Kanye_West_at_2019_Met_Gala_%28cropped%29.jpg">
<div>Kanye West</div>
</div>
</div>

<h2>Albums</h2>
<div class="row">
${albums.map((a,i)=>`
<div class="card" onclick="openAlbum(${i})">
<img src="${a.img}">
<div>${a.name}</div>
</div>`).join("")}
</div>
`;
}

// ARTIST
function artistPage(){
show("artist");

const a=albums[0];

artist.innerHTML=`
<div class="hero">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Kanye_West_at_2019_Met_Gala_%28cropped%29.jpg">
<div class="heroName">Kanye West</div>
</div>

<h2>Top Songs</h2>

${a.tracks.map((t,i)=>`
<div class="song" onclick="currentAlbum=albums[0]; play(${i})">
<img src="${a.img}">
<div>${t.name}</div>
</div>
`).join("")}
`;
}

// ALBUM
function openAlbum(i){
currentAlbum=albums[i];
show("album");

album.innerHTML=`
<h2>${currentAlbum.name}</h2>

${currentAlbum.tracks.map((t,i)=>`
<div class="song" onclick="play(${i})">
<img src="${currentAlbum.img}">
<div>${t.name}</div>
</div>
`).join("")}
`;
}

// PLAYER
function play(i){
currentIndex=i;
const t=currentAlbum.tracks[i];

audio.src=t.file;
audio.play();

title.innerText=t.name;
cover.src=currentAlbum.img;
}

function togglePlay(){
if(audio.paused) audio.play();
else audio.pause();
}

function next(){
currentIndex++;
if(currentIndex>=currentAlbum.tracks.length) currentIndex=0;
play(currentIndex);
}

// INIT
home();

</script>

</body>
</html>

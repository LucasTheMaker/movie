<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | Apple Music 2026 Edition</title>
    <style>
        :root { --apple-red: #fa2d48; --glass: rgba(28, 28, 30, 0.8); }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 90px; }

        /* iOS 26 "Liquid Glass" Navigation */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--glass); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 25px; border: 0.5px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 10px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--apple-red); transform: scale(1.1); }

        /* Library Page */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .horizontal-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 20px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .album-card { min-width: 160px; cursor: pointer; transition: transform 0.2s; }
        .album-card:active { transform: scale(0.95); }
        .album-card img { width: 100%; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Full Mobile Album Deep-Dive */
        .album-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .album-hero { padding: 60px 20px 30px; text-align: center; transition: background 0.5s ease; }
        .hero-img { width: 240px; height: 240px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        
        .action-bar { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .btn-apple { background: rgba(255,255,255,0.1); color: #fff; padding: 14px 45px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); }
        .btn-play { background: #fff; color: #000; }

        .track-list { padding: 0 5px 120px; }
        .track-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .t-num { width: 35px; color: #666; font-size: 14px; }
        .t-info { flex: 1; }
        .t-name { font-weight: 500; font-size: 16px; display: flex; align-items: center; gap: 6px; }
        .e-tag { background: #666; color: #000; font-size: 9px; padding: 1px 4px; border-radius: 2px; font-weight: 800; }
        
        .nitty-gritty-footer { padding: 30px 20px; border-top: 0.5px solid #222; font-size: 13px; color: #888; line-height: 1.6; }
        .back-nav { position: fixed; top: 25px; left: 20px; font-size: 18px; color: var(--apple-red); font-weight: 600; z-index: 2001; cursor: pointer; }
    </style>
</head>
<body>

    <div id="musicTab" class="page active">
        <div style="padding: 60px 20px 10px;">
            <h1 style="font-size: 34px; letter-spacing: -1px; margin: 0;">Kanye West</h1>
            <p style="color: var(--apple-red); font-weight: 700; font-size: 14px; margin-top: 4px;">Verified Artist • 2026</p>
        </div>

        <h2 style="padding: 0 20px; margin-top: 35px; font-size: 20px;">Essential Albums</h2>
        <div class="horizontal-scroll" id="essentialRow"></div>

        <h2 style="padding: 0 20px; margin-top: 30px; font-size: 20px;">Albums</h2>
        <div class="horizontal-scroll" id="albumRow"></div>
    </div>

    <div id="albumView" class="album-view">
        <div class="back-nav" onclick="closeAlbum()">‹ Library</div>
        <div id="albumContent"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span>🎬</span>Movies</div>
        <div class="nav-item active"><span>🎵</span>Music</div>
        <div class="nav-item"><span>🔍</span>Search</div>
    </div>

    <script>
        const discography = [
            { 
                title: "BULLY", year: 2026, genre: "Alternative Hip-Hop", 
                img: "https://images.genius.com/f047464654929851722650c7038e235e.1000x1000x1.jpg", 
                essential: true, dist: "YZY / Gamma", time: "42:26", release: "March 28, 2026",
                tracks: ["KING", "THIS A MUST", "FATHER (feat. Travis Scott)", "ALL THE LOVE", "SISTERS AND BROTHERS", "BULLY (feat. CeeLo Green)", "PREACHER MAN", "BEAUTY AND THE BEAST"] 
            },
            { 
                title: "The Life of Pablo", year: 2016, genre: "Hip-Hop/Rap",
                img: "https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg", 
                essential: true, dist: "G.O.O.D. Music / Def Jam", time: "66:01", release: "February 14, 2016",
                tracks: ["Ultralight Beam", "Father Stretch My Hands Pt. 1", "Famous", "Feedback", "Waves", "FML", "Real Friends", "Wolves"] 
            },
            { 
                title: "My Beautiful Dark Twisted Fantasy", year: 2010, genre: "Hip-Hop/Rap",
                img: "https://m.media-amazon.com/images/I/91M9pUeHbeL.jpg", 
                essential: true, dist: "Roc-A-Fella / Def Jam", time: "68:36", release: "November 22, 2010",
                tracks: ["Dark Fantasy", "Gorgeous", "POWER", "All of the Lights", "Monster", "So Appalled", "Runaway"] 
            }
        ];

        function render() {
            const eR = document.getElementById('essentialRow');
            const aR = document.getElementById('albumRow');
            discography.forEach((alb, i) => {
                const card = `<div class="album-card" onclick="openAlbum(${i})"><img src="${alb.img}"><p style="font-size:14px; margin:10px 0 2px; font-weight:600;">${alb.title}</p><p style="color:#888; font-size:12px; margin:0;">${alb.year}</p></div>`;
                aR.innerHTML += card;
                if(alb.essential) eR.innerHTML += card;
            });
        }

        function openAlbum(index) {
            const alb = discography[index];
            const view = document.getElementById('albumView');
            const content = document.getElementById('albumContent');
            
            content.innerHTML = `
                <div class="album-hero">
                    <img src="${alb.img}" class="hero-img">
                    <h2 style="margin:25px 0 5px; font-size:24px;">${alb.title}</h2>
                    <p style="color:var(--apple-red); font-weight:600; font-size:18px;">Kanye West</p>
                    <p style="color:#888; font-size:11px; margin-top:8px; font-weight:700;">${alb.genre.toUpperCase()} • ${alb.year} • LOSSLESS • DOLBY ATMOS</p>
                    <div class="action-bar">
                        <div class="btn-apple btn-play"><span>▶</span> Play</div>
                        <div class="btn-apple"><span>🔀</span> Shuffle</div>
                    </div>
                </div>
                <div class="track-list">
                    ${alb.tracks.map((t, idx) => `
                        <div class="track-item">
                            <span class="t-num">${idx + 1}</span>
                            <div class="t-info">
                                <div class="t-name">${t} <span class="e-tag">E</span></div>
                            </div>
                            <span style="color:#666; font-size:14px;">▶</span>
                        </div>
                    `).join('')}
                    <div class="nitty-gritty-footer">
                        <p>${alb.release}</p>
                        <p>${alb.tracks.length} Songs, ${alb.time}</p>
                        <p>℗ ${alb.year} ${alb.dist}</p>
                    </div>
                </div>
            `;
            view.style.display = "block";
            window.scrollTo(0,0);
        }

        function closeAlbum() { document.getElementById('albumView').style.display = "none"; }
        window.onload = render;
    </script>
</body>
</html>

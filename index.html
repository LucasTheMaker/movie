<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --nav-bg: rgba(15, 15, 15, 0.96); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .explicit { background: #888; color: #000; font-size: 9px; padding: 1px 3px; border-radius: 2px; margin-left: 4px; font-weight: bold; }
        
        /* Sidebar (PC Only) */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: 500; }
        .nav-link.active { color: #fff; background: #222; border-left: 3px solid var(--apple-red); }

        /* Main View */
        .main-view { flex: 1; overflow-y: scroll; position: relative; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Hero Banner */
        .hero { width: 100%; height: 40vh; background: linear-gradient(to bottom, transparent 0%, #000 100%), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/20% no-repeat; background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }

        /* Mobile Scroller Styles */
        .section-label { padding: 20px 20px 10px; font-size: 22px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .scroller { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroller::-webkit-scrollbar { display: none; }
        
        /* Cards */
        .album-card { min-width: 160px; cursor: pointer; transition: 0.2s; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .album-title { font-weight: 600; font-size: 14px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Bottom Nav (Mobile Only) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(20px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 12px 0 35px; z-index: 2000; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .hero { height: 32vh; padding: 20px; }
        }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:2px; margin-bottom:40px;">LUCAS HUB</h2>
        <div class="nav-link active" onclick="showTab('music')">🎵 Music</div>
        <div class="nav-link" onclick="showTab('movies')">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <section id="music-tab" class="tab-content active">
            <div class="hero">

                <h1 style="font-size: clamp(34px, 5vw, 60px); margin: 0;">Kanye West</h1>
            </div>

            <div class="section-label">Essential Albums</div>
            <div class="scroller" id="essentials-grid"></div>

            <div class="section-label">Full Discography</div>
            <div class="scroller" id="full-grid"></div>
        </section>

        <section id="movies-tab" class="tab-content">
            <div style="padding: 40px;">
                <h1>Movies</h1>
                <div class="scroller">
                    <div class="album-card"><img src="https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg"><p>Iron Man</p></div>
                    <div class="album-card"><img src="https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg"><p>Spider-Man</p></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div onclick="showTab('music')">🏠<br><small>Home</small></div>
        <div onclick="showTab('movies')">🎬<br><small>Movies</small></div>
    </nav>

    <div id="album-view" class="overlay">

        <div id="album-content" style="text-align:center;"></div>
    </div>

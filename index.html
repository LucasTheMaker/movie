<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lucas's Movie Collection</title>
    <style>
        body {
            background-color: #0a0c10; /* Disney+ Dark Blue */
            color: #f9f9f9;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }
        h1 {
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 114, 210, 0.6);
        }
        .category-title {
            font-size: 1.4rem;
            font-weight: bold;
            border-left: 5px solid #e50914; /* Netflix Red Accent */
            padding-left: 15px;
            margin-top: 40px;
        }
        .movie-card {
            width: 280px;
            height: 160px;
            background-color: #1a1d29;
            border-radius: 12px;
            border: 2px solid #31343e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            transition: transform 0.3s;
        }
        .movie-card:hover {
            transform: scale(1.05);
            border-color: #0072d2;
        }
    </style>
</head>
<body>
    <h1>Lucas's Premiere Theater 🎬</h1>
    <div class="category-title">Marvel Classics 🕷️</div>
    <div class="movie-card">Spider-Man (2002) - Coming Soon</div>
</body>
</html>

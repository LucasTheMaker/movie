<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 80px; overflow: hidden; height: 100vh; }
        
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #fa2d48; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Search Tab Styles */
        .search-header { padding: 40px 20px 10px; position: sticky; top: 0; background: #000; z-index: 10; }
        .search-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #222; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .results-container { padding: 0 20px; }
        .result-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 0.5px solid #222; cursor: pointer; }
        .result-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .result-type { font-size: 10px; color: #fa2d48; text-transform: uppercase; font-weight: bold; }

        /* Existing Grid Styles */
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 20px; }
        .album-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }
        iframe { width: 100%; height: calc(100vh - 70px); border: none; }
    </style>
</head>
<body>

    <div id="moviesTab" class="page active">
        <iframe src="https://lucasthemaker.github.io/movie/index.html"></iframe>
    </div>

    <div id="musicTab" class="page">
        <div style="padding: 20px;">
            <h1 style="margin: 0;">Kanye West</h1>
            <p style="color: #fa2d48; margin-top: 5px;">Artist • Verified 2026</p>
        </div>
        <div class="music-grid" id="albumGrid"></div>
    </div>

    <div id="searchTab" class="page">
        <div class="search-header">
            <h1 style="margin-top: 0;">Search</h1>
            <input type="text" id="searchInput" class="search-input" placeholder="Artists, Movies, or Songs...">
        </div>
        <div id="searchResults" class="results-container">
            <p style="color: #555; text-align: center; margin-top: 40px;">Enter a title to search your library</p>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showPage('moviesTab', this)"><span class="nav-icon">🎬</span><span>Movies</span></button>
        <button class="nav-item" onclick="showPage('musicTab', this)"><span class="nav-icon">🎵</span><span>Music</span></button>
        <button class="nav-item" onclick="showPage('searchTab', this)"><span class="nav-icon">🔍</span><span>Search</span></button>
    </div>

    <script>
        // Data for Search Engine
        const musicData = [
            { title: "BULLY", type: "Album", year: 2026, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.jpg", songs: ["Preacher Man", "Father", "Beauty and the Beast"] },
            { title: "Vultures 2", type: "Album", year: 2024, img: "https://upload.wikimedia.org/wikipedia/en/b/b3/Vultures_2_cover.jpg", songs: ["Slide", "Field Trip", "River"] },
            { title: "Graduation", type: "Album", year: 2007, img: "https://m.media-amazon.com/images/I/8152D6J3N9L.jpg", songs: ["Stronger", "Flashing Lights"] }
            // Add more albums here...
        ];

        const movieData = [
            { title: "Spider-Man: No Way Home", type: "Movie", img: "https://m.media-amazon.com/images/I/81Ni6s73rlL.jpg" },
            { title: "The Batman", type: "Movie", img: "https://m.media-amazon.com/images/I/81dg68XUqzL.jpg" }
            // Add your movie titles here...
        ];

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Search Engine Logic
        const searchInput = document.getElementById('searchInput');
        const resultsBox = document.getElementById('searchResults');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            resultsBox.innerHTML = "";

            if (!query) {
                resultsBox.innerHTML = '<p style="color: #555; text-align: center; margin-top: 40px;">Enter a title to search your library</p>';
                return;
            }

            // Search Albums & Movies
            const allItems = [...musicData, ...movieData];
            const filtered = allItems.filter(item => item.title.toLowerCase().includes(query));

            // Search Songs specifically
            musicData.forEach(album => {
                album.songs.forEach(song => {
                    if (song.toLowerCase().includes(query)) {
                        filtered.push({ title: song, type: "Song", img: album.img, sub: album.title });
                    }
                });
            });

            if (filtered.length === 0) {
                resultsBox.innerHTML = '<p style="color: #555; text-align: center; margin-top: 40px;">No results found.</p>';
            }

            filtered.forEach(item => {
                resultsBox.innerHTML += `
                    <div class="result-item">
                        <img src="${item.img}" class="result-img">
                        <div>
                            <div class="result-type">${item.type}</div>
                            <div style="font-weight: bold;">${item.title}</div>
                            <div style="font-size: 12px; color: #888;">${item.sub || item.year || ''}</div>
                        </div>
                    </div>`;
            });
        });

        // Initialize Music Grid
        window.onload = () => {
            const grid = document.getElementById('albumGrid');
            musicData.forEach(alb => {
                grid.innerHTML += `<div class="album-card"><img src="${alb.img}"><h4>${alb.title}</h4><p>${alb.year}</p></div>`;
            });
        };
    </script>
</body>
</html>

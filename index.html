<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LucasFlix - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; --gray: #a3a3a3; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; }
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .logo { color: var(--red); font-size: 26px; font-weight: bold; text-decoration: none; margin-right: 30px; }
        
        .main-container { padding: 40px 50px; }
        .focus-row { display: flex; gap: 20px; align-items: flex-start; }

        .hero-container { width: 700px; text-decoration: none; color: white; cursor: pointer; }
        .image-box { width: 100%; height: 400px; border-radius: 8px; overflow: hidden; position: relative; }
        
        /* Normal: Crouching Spidey | Hover: Eye Zoom */
        .normal-img, .zoom-img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: 0.5s ease; }
        .zoom-img { opacity: 0; transform: scale(1.2); }
        
        .hero-container:hover .normal-img { opacity: 0; }
        .hero-container:hover .zoom-img { opacity: 1; transform: scale(1.0); }

        .hero-details { margin-top: 20px; }
        .meta { color: var(--gray); font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .description { font-size: 16px; line-height: 1.5; margin-bottom: 20px; max-width: 600px; }
        
        .btn-row { display: flex; gap: 10px; }
        .btn { padding: 10px 25px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-play { background: white; color: black; }
        .btn-info { background: rgba(109, 109, 110, 0.8); color: white; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo">LUCASFLIX</a></nav>
    <div class="main-container">
        <p style="font-weight: bold; font-size: 20px;">My List</p>
        <div class="focus-row">
            <div class="hero-container" onclick="window.location.href='spiderman-2002.html'">
                <div class="image-box">
                    <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e7602058-294c-474c-8975-571d701d596e/dg9x0yl-b166299b-4303-49d7-83de-be760773d2a7.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9" class="normal-img">
                    <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e7602058-294c-474c-8975-571d701d596e/df6200l-d08e82a3-764f-4d4f-9e66-6b66a836858e.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9" class="zoom-img">
                </div>
                <div class="hero-details">
                    <div class="meta">Superheroes • 2002 • Movie • PG-13</div>
                    <div class="description">After being bitten by a genetically-altered spider, Peter Parker gains superhuman strength and the spider-like ability to cling to any surface.</div>
                    <div class="btn-row">
                        <button class="btn btn-play">▶ Play</button>
                        <button class="btn btn-info" onclick="event.stopPropagation(); window.location.href='spiderman-2002.html'">ⓘ More Info</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

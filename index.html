<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | Music</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card-bg: #181818; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid #222; padding: 40px 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; color: #888; border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: #fff; background: #222; border-left: 4px solid var(--apple-red); }
        .nav-item:hover { color: #fff; background: #1a1a1a; }

        .main-view { flex: 1; overflow-y: auto; padding-bottom: 150px; }
        .hero { height: 35vh; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }
        
        .scroller { display: flex; overflow-x: auto; gap: 20px; padding: 20px 40px; scrollbar-width: none; }
        .card { min-width: 180px; background: var(--card-bg); padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); background: #222; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 6px; margin-bottom: 10px; object-fit: cover; }

        .player-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid #222; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 3000; }
        .track-info { display: flex; align-items: center; gap: 15px; width: 35%; }
        .track-info img { width: 50px; height: 50px; border-radius: 4px; background: #222; }
        audio { flex: 1; max-width: 400px; height: 32px; filter: invert(100%); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .track-row { display: flex; justify-content: space-between; padding: 15px 40px; border-bottom: 1px solid #111; cursor: pointer; }
        .track-row:hover { background: #111; color: var(--apple-red); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size: 11px; color: #444; margin-bottom: 30px; letter-spacing: 2px;">LUCAS HUB</h2>
        <div class="nav-item active">🏠 Music</div>
        <div class="nav-item" onclick="window.location.href='movie.html'">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <div class="hero">
            <h1 style="font-size: 50px; margin: 0; letter-spacing: -2px;">Kanye West</h1>
        </div>
        <div style="padding: 30px 40px 0; font-weight: 800; font-size: 20px;">Streaming Library</div>
        <div class="scroller" id="album-row"></div>
    </main>

    <div id="overlay" class="overlay">
        <div style="padding: 20px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10;">
            <span onclick="closeOverlay()" style="cursor:pointer; font-weight:bold; color:var(--apple-red);">← BACK</span>
        </div>
        <div id="overlay-header" style="text-align:center; padding: 20px;"></div>
        <div id="track-list" style="max-width: 700px; margin: 0 auto;"></div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="p-img" src="">
            <div style="overflow: hidden;">
                <div id="p-title" style="font-weight:bold; font-size:14px; white-space: nowrap; text-overflow: ellipsis;">No Track Selected</div>
                <div id="p-album" style="font-size:11px; color:#666;">Ready to stream</div>
            </div>
        </div>
        <audio id="player-core" controls></audio>
    </div>

    <script>
        const githubUser = "lucasthemaker"; 
        const repo = "Music"; // Make sure this matches your GitHub repo name capitalization
        const baseRawUrl = `https://raw.githubusercontent.com/${githubUser}/${repo}/main/`;

        const albums = [
            { 
                title: "Ye", year: 2018, img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg", 
                tracks: [
                    { name: "I Thought About Killing You", file: "I%20Thought%20About%20Killing%20You.mp3" },
                    { name: "Yikes", file: "2.%20Yikes.mp3" },
                    { name: "All Mine", file: "3.%20All%20Mine.mp3" },
                    { name: "Wouldn't Leave", file: "4.%20Wouldn't%20Leave.mp3" },
                    { name: "No Mistakes", file: "5.%20No%20Mistakes.mp3" },
                    { name: "Ghost Town", file: "6.%20Ghost%20Town.mp3" },
                    { name: "Violent Crimes", file: "7.%20Violent%20Crimes.mp3" }
                ] 
            }
        ];

        function init() {
            const row = document.getElementById('album-row');
            albums.forEach(a => {
                row.innerHTML += `
                    <div class="card" onclick="openAlb('${a.title}')">
                        <img src="${a.img}">
                        <p class="card-title">${a.title}</p>
                    </div>`;
            });
        }

        function openAlb(t) {
            const a = albums.find(x => x.title === t);
            document.getElementById('overlay-header').innerHTML = `<img src="${a.img}" style="width:200px; border-radius:12px;"><h1>${a.title}</h1>`;
            document.getElementById('track-list').innerHTML = a.tracks.map(tr => `
                <div class="track-row" onclick="play('${tr.file}', '${tr.name}', '${a.img}', '${a.title}')">
                    <span>${tr.name}</span>
                    <span style="color:var(--apple-red)">▶</span>
                </div>
            `).join('');
            document.getElementById('overlay').style.display = 'block';
        }

        function play(file, name, img, alb) {
            const audio = document.getElementById('player-core');
            audio.src = baseRawUrl + file;
            document.getElementById('p-title').innerText = name;
            document.getElementById('p-album').innerText = alb;
            document.getElementById('p-img').src = img;
            audio.play();
        }

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>

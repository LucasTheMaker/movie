<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card-bg: #151515; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Nav */
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid #222; padding: 40px 20px; flex-shrink: 0; }
        .nav-item { padding: 14px; color: #888; border-radius: 10px; margin-bottom: 8px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #fff; background: #222; border-left: 4px solid var(--apple-red); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 10px 0 30px; z-index: 1000; }

        /* Main Area */
        .main-view { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        .hero { height: 40vh; background: linear-gradient(to bottom, transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .section-label { padding: 30px 40px 10px; font-size: 20px; font-weight: 800; }

        /* Scroller & Cards */
        .scroller { display: flex; overflow-x: auto; gap: 20px; padding: 0 40px 20px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .card { min-width: 180px; background: var(--card-bg); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: scale(1.02); background: #1a1a1a; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; margin-bottom: 10px; object-fit: cover; background: #222; }
        .card-title { font-weight: 700; font-size: 14px; margin: 0; }
        .card-meta { font-size: 11px; color: #666; margin-top: 4px; }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .track-row { display: flex; justify-content: space-between; padding: 15px 40px; border-bottom: 1px solid #111; font-size: 14px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .scroller { padding: 0 20px 20px; }
            .hero, .section-label { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:10px; color:#444; letter-spacing:2px; margin-bottom:40px;">HUB v2.6</h2>
        <div class="nav-item active" id="pc-music" onclick="switchTab('music')">🏠 Home</div>
        <div class="nav-item" id="pc-movies" onclick="switchTab('movies')">🎬 Movies

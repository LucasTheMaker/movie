<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | Music</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card-bg: #181818; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR (PC ONLY) --- */
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid #222; padding: 40px 20px; flex-shrink: 0; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; color: #888; border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .nav-item.active { color: #fff; background: #222; border-left: 4px solid var(--apple-red); }
        .nav-item:hover { color: #fff; background: #1a1a1a; }

        /* --- MAIN CONTENT --- */
        .main-view { flex: 1; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .hero { height: 40vh; min-height: 250px; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }
        
        .section-header { padding: 30px 40px 10px; font-weight: 800; font-size: 24px; letter-spacing: -1px; }

        .scroller { display: flex; overflow-x: auto; gap: 20px; padding: 10px 40px 30px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }

        .card { min-width: 180px; width: 180px; background: var(--card-bg); padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); background: #222; border-color: #444; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; margin-bottom: 12px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-title { font-weight: 700; font-size: 15px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.98); backdrop-filter: blur(15px); border-top: 1px solid #222; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 3000; }
        .track-info { display: flex; align-items: center; gap: 12px; width: 30%; }
        .track-info img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; background: #222; }
        .track-text { overflow: hidden; }
        #p-title { font-weight: bold; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        #p-album { font-size: 11px; color: #666; }

        audio { flex: 1; max-width: 450px; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.2); }

        /* --- MOBILE RESPONSIVE FIXES --- */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on phones */
            .hero { height: 30vh; padding: 20px; }
            .hero h1 { font-size: 35px !important; }
            .section-header { padding: 20px 20px 10px; font-size: 20px; }
            .scroller { padding: 10px 20px 30px; }
            .card { min-width: 150px; width: 150px; padding: 10px; }
            
            .player-bar { padding: 10px 15px; flex-direction: column; gap: 10px; }
            .track-info { width: 100%; justify-content: center; text-align: center; }
            audio { width: 100%; max-width: none; }
            
            /* Add a mobile "Home" button since sidebar is gone */
            .mobile-nav { display: block; position: absolute; top: 15px; right: 15px; background: var(--apple-red); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 100; }
        }

        @media (min-width: 769px) { .mobile-nav { display: none; } }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .track-row { display: flex; justify-content: space-between; padding: 15px 40px; border-bottom: 1px solid #111; cursor: pointer; }
        .track-row:hover { background: #111; color: var(--apple-red); }
    </style>
</head>
<body>

    <div class="mobile-nav" onclick="window.location.href='movie.html'">MOVIES</div>

    <nav class="sidebar">
        <h2 style="font-size: 12px; color: #444; margin-bottom: 30px; letter-spacing: 2px;">LUCAS HUB</h2>
        <div class="nav-item active">🏠 Music</div>
        <div class="nav-item" onclick="window.location.href='movie.html'">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <div class="hero">
            <h1 style="font-size: 60px; margin: 0; letter-spacing: -3px; font-weight: 900;">Kanye West</h1>
        </div>
        <div class="section-header">Ye Discography</div>
        <div class="scroller" id="album-row"></div>
    </main>

    <div id="overlay" class="overlay">
        <div style="padding: 25px; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 10;">
            <span onclick="closeOverlay()" style="cursor:pointer; font-weight:bold; color:var(--apple-red); font-size: 14px;">← BACK TO HUB</span>
        </div>
        <div id="overlay-header" style="text-align:center; padding: 20px 20px 40px;"></div>
        <div id="track-list" style="max-width: 800px; margin: 0 auto; padding-bottom: 150px;"></div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="p-img" src="https://raw.githubusercontent.com/playermatrix/assets/main/placeholder.png">
            <div class="track-text">
                <div id="p-title">Select a Track</div>
                <div id="p-album">Ready to stream</div>
            </div>
        </div>
        <audio id="player-core" controls></audio>
    </div>

    <script>
        const githubUser = "lucasthemaker"; 
        const repo = "Music"; 
        const baseRawUrl = `https://raw.githubusercontent.com/${githubUser}/${repo}/main/`;

        const albums = [
            { 
                title: "Ye", year: 2018, img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg", 
                tracks: [
                    { name: "I Thought About Killing You", file: "I%20Thought%20About%20Killing%20You.mp3" },
                    { name: "Yikes", file: "2.%20Yikes.mp3" },
                    { name: "All Mine", file: "3.%20All%20Mine.mp3" },
                    { name: "Wouldn't Leave", file: "4.%20Wouldn't%20Leave.mp3" },
                    { name: "No Mistakes", file: "5.%20No%20Mistakes.mp3" },
                    { name: "Ghost Town", file: "6.%20Ghost%20Town.mp3" },
                    { name: "Violent Crimes", file: "7.%20Violent%20Crimes.mp3" }
                ] 
            }
        ];

        function init() {
            const row = document.getElementById('album-row');
            albums.forEach(a => {
                row.innerHTML += `
                    <div class="card" onclick="openAlb('${a.title}')">
                        <img src="${a.img}">
                        <p class="card-title">${a.title}</p>
                    </div>`;
            });
        }

        function openAlb(t) {
            const a = albums.find(x => x.title === t);
            document.getElementById('overlay-header').innerHTML = `<img src="${a.img}" style="width:220px; border-radius:12px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);"><h1>${a.title}</h1><p style="color:#666">${a.year}</p>`;
            document.getElementById('track-list').innerHTML = a.tracks.map((tr, i) => `
                <div class="track-row" onclick="play('${tr.file}', '${tr.name}', '${a.img}', '${a.title}')">
                    <span><span style="color:#444; margin-right:15px;">${i+1}</span> ${tr.name}</span>
                    <span style="color:var(--apple-red)">▶</span>
                </div>
            `).join('');
            document.getElementById('overlay').style.display = 'block';
        }

        function play(file, name, img, alb) {
            const audio = document.getElementById('player-core');
            audio.src = baseRawUrl + file;
            document.getElementById('p-title').innerText = name;
            document.getElementById('p-album').innerText = alb;
            document.getElementById('p-img').src = img;
            audio.play();
        }

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- NAVIGATION --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 60px 20px; z-index: 100; }
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); border-top: 1px solid #333; display: none; padding: 12px 0; z-index: 2000; }
        
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 5px; font-weight: 500; }
        .nav-link.active { background: #222; color: var(--apple-red); }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--apple-red); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
        }

        /* --- CONTENT --- */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; padding-bottom: 120px; z-index: 10; }
        .page { display: none; pointer-events: all; }
        .page.active { display: block; }

        /* --- CARDS & GRIDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .clickable-card { cursor: pointer; transition: 0.2s; position: relative; z-index: 20; }
        .clickable-card:active { transform: scale(0.95); }
        .clickable-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; background: #222; }
        .movie-card img { aspect-ratio: 2/3; }

        /* --- SEARCH --- */
        .search-input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; }
        .search-input:focus { border-color: var(--apple-red); }
        .search-result-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }

        /* --- OVERLAY --- */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .back-btn { color: var(--apple-red); font-weight: bold; cursor: pointer; padding: 10px 0; display: inline-block; font-size: 18px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:1.5px; margin-bottom:30px;">LIBRARY</h2>
        <div class="nav-link active" onclick="switchTab('music')">🎵 Music</div>
        <div class="nav-link" onclick="switchTab('movies')">🎬 Movies</div>
        <div class="nav-link" onclick="switchTab('search')">🔍 Search</div>
    </nav>

    <main class="main-content">
        <section id="music-page" class="page active">
            <h1>Music</h1>
            <div class="grid">
                <div class="clickable-card" onclick="openArtist('Kanye West')">
                    <img src="https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg">
                    <p style="text-align:center; font-weight:600; margin-top:10px;">Kanye West</p>
                </div>
            </div>
            <div id="artist-details" style="display:none; margin-top:50px;">
                <h2 id="artist-title" style="font-size:32px;"></h2>
                <h3>Essential Albums</h3>
                <div id="essentials-grid" class="grid"></div>
                <h3 style="margin-top:40px;">Full Discography</h3>
                <div id="full-disc-grid" class="grid"></div>
            </div>
        </section>

        <section id="movies-page" class="page">
            <h1>Movies</h1>
            <div class="grid">
                <div class="clickable-card movie-card" onclick="openMovie('Iron Man')">
                    <img src="https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg">
                    <p style="text-align:center; font-weight:600; margin-top:10px;">Iron Man</p>
                </div>
                <div class="clickable-card movie-card" onclick="openMovie('Spider-Man')">
                    <img src="https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg">
                    <p style="text-align:center; font-weight:600; margin-top:10px;">Spider-Man</p>
                </div>
            </div>
        </section>

        <section id="search-page" class="page">
            <h1>Search</h1>
            <input type="text" id="main-search" class="search-input" placeholder="Search movies or artists..." onkeyup="handleSearch()">
            <div id="search-output"></div>
        </section>
    </main>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="switchTab('music')">🎵<br>Music</div>
        <div class="nav-item" onclick="switchTab('movies')">🎬<br>Movies</div>
        <div class="nav-item" onclick="switchTab('search')">🔍<br>Search</div>
    </nav>

    <div id="view-overlay" class="full-overlay">
        <div class="back-btn" onclick="closeOverlay()">‹ Back</div>
        <div id="overlay-content"></div>
    </div>

    <script>
        const musicData = {
            "Kanye West": {
                albums: [
                    { title: "BULLY", essential: false, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png", tracks: ["Sisters and Brothers", "Father", "Bully", "Preacher Man", "Beauty and the Beast"] },
                    { title: "Yeezus", essential: true, img: "https://upload.wikimedia.org/wikipedia/en/0/03/Yeezus_album_cover.png", tracks: ["On Sight", "Black Skinhead", "I Am a God", "New Slaves", "Hold My Liquor", "I'm In It", "Blood on the Leaves", "Guilt Trip", "Send It Up", "Bound 2"] },
                    { title: "The Life of Pablo", essential: true, img: "https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg", tracks: ["Ultralight Beam", "Famous", "Waves", "Wolves", "Saint Pablo"] }
                ]
            }
        };

        const movieData = {
            "Iron Man": { year: 2008, desc: "Tony Stark builds a suit of armor.", img: "https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg" },
            "Spider-Man": { year: 2002, desc: "Peter Parker gains spider powers.", img: "https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg" }
        };

        function switchTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
            
            document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.toLowerCase().includes(id)) el.classList.add('active');
            });
        }

        function openArtist(name) {
            const art = musicData[name];
            document.getElementById('artist-details').style.display = 'block';
            document.getElementById('artist-title').innerText = name;
            
            const ess = document.getElementById('essentials-grid');
            const full = document.getElementById('full-disc-grid');
            ess.innerHTML = ""; full.innerHTML = "";

            art.albums.forEach((alb, i) => {
                const html = `<div class="clickable-card" onclick="showAlbumTracklist('${name}', ${i})"><img src="${alb.img}"><p style="font-size:13px; margin-top:8px;">${alb.title}</p></div>`;
                full.innerHTML += html;
                if(alb.essential) ess.innerHTML += html;
            });
            window.scrollTo({top: 500, behavior: 'smooth'});
        }

        function showAlbumTracklist(artist, i) {
            const alb = musicData[artist].albums[i];
            const content = document.getElementById('overlay-content');
            content.innerHTML = `
                <div style="text-align:center;">
                    <img src="${alb.img}" style="width:280px; border-radius:15px; margin-bottom:20px;">
                    <h1>${alb.title}</h1>
                    <div style="max-width:500px; margin:auto; text-align:left; background:#111; padding:20px; border-radius:12px;">
                        ${alb.tracks.map((t, idx) => `<p style="padding:10px 0; border-bottom:1px solid #222;">${idx+1}. ${t}</p>`).join('')}
                    </div>
                </div>`;
            document.getElementById('view-overlay').style.display = 'block';
        }

        function openMovie(name) {
            const mov = movieData[name];
            const content = document.getElementById('overlay-content');
            content.innerHTML = `
                <div style="text-align:center;">
                    <img src="${mov.img}" style="width:250px; border-radius:12px;">
                    <h1>${name}</h1>
                    <p style="color:var(--apple-red); font-weight:bold;">Released: ${mov.year}</p>
                    <p style="max-width:600px; margin:20px auto; line-height:1.6; color:#ccc;">${mov.desc}</p>
                </div>`;
            document.getElementById('view-overlay').style.display = 'block';
        }

        function closeOverlay() { document.getElementById('view-overlay').style.display = 'none'; }

        function handleSearch() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const out = document.getElementById('search-output');
            out.innerHTML = "";
            if(!q) return;

            for(let key in movieData) {
                if(key.toLowerCase().includes(q)) {
                    out.innerHTML += `<div class="search-result-item" onclick="openMovie('${key}')">🎬 <b>${key}</b> <span style="color:#666; margin-left:10px;">Movie</span></div>`;
                }
            }
            for(let key in musicData) {
                if(key.toLowerCase().includes(q)) {
                    out.innerHTML += `<div class="search-result-item" onclick="switchTab('music'); openArtist('${key}')">🎵 <b>${key}</b> <span style="color:#666; margin-left:10px;">Artist</span></div>`;
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goat Movies - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; --gray: #a3a3a3; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 26px; font-weight: bold; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; margin-left: 40px; cursor: pointer; font-size: 15px; }

        .main-container { padding: 100px 50px 50px; }
        .section-title { font-size: 22px; font-weight: bold; margin: 40px 0 20px 0; }

        /* Featured Section (Landscape) */
        .featured-row { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 50px; }
        .hero-container { width: 750px; flex-shrink: 0; cursor: pointer; text-decoration: none; color: white; }
        .hero-box { 
            width: 100%; 
            height: 420px; 
            border-radius: 6px; 
            overflow: hidden; 
            border: 2px solid #333;
            transition: 0.3s ease;
        }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .hero-container:hover .hero-box { border-color: white; transform: scale(1.01); }

        .hero-details { margin-top: 15px; }
        .meta { color: var(--gray); font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .description { font-size: 16px; line-height: 1.4; color: #ccc; max-width: 700px; }

        /* Poster Grid (Standing Tall) */
        .poster-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .poster-card { 
            width: 220px; /* Thinner width for "Standing Tall" look */
            height: 330px; /* Taller height */
            border-radius: 6px; 
            background-size: cover; 
            background-position: center; 
            cursor: pointer; 
            transition: 0.3s;
            border: 2px solid transparent;
            flex-shrink: 0;
        }
        .poster-card:hover { transform: scale(1.05); border-color: white; z-index: 5; }

        .btn { padding: 12px 28px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn-play { background: white; color: black; }
    </style>
</head>

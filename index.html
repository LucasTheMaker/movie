<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 0.5px solid #333; z-index: 1000; }
        .nav-item { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #fa2d48; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Album Grid */
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 10px; }
        .album-card { cursor: pointer; transition: transform 0.2s; }
        .album-card:active { transform: scale(0.95); }
        .album-card img { width: 100%; border-radius: 12px; aspect-ratio: 1/1; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .album-card h4 { font-size: 14px; margin: 8px 0 2px; text-align: left; }
        .album-card p { font-size: 12px; color: #888; margin: 0; }

        /* Modal (Tracklist Pop-up) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 40px 20px; }
        .modal-content { max-width: 500px; margin: 0 auto; text-align: left; }
        .close-btn { font-size: 30px; position: absolute; top: 20px; right: 20px; cursor: pointer; }
        .track-list { list-style: none; padding: 0; margin-top: 20px; }
        .track-item { padding: 12px 0; border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; }

        iframe { width: 100%; height: 90vh; border: none; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <iframe src="https://lucasthemaker.github.io/movie/index.html"></iframe>
    </div>

    <div id="music" class="page">
        <h1 style="text-align: left; margin-bottom: 5px;">Library</h1>
        <p style="color: #fa2d48; font-weight: bold; text-align: left; margin-top: 0;">Kanye West</p>
        <div class="music-grid" id="albumGrid">
            </div>
    </div>

    <div id="search" class="page">
        <h1>Search</h1>
        <input type="text" style="width:100%; padding:12px; border-radius:10px; border:none; background:#222; color:#fff;" placeholder="Search tracks...">
    </div>

    <div id="albumModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home', this)"><span class="nav-icon">🏠</span><span>Home</span></button>
        <button class="nav-item" onclick="showPage('music', this)"><span class="nav-icon">🎵</span><span>Music</span></button>
        <button class="nav-item" onclick="showPage('search', this)"><span class="nav-icon">🔍</span><span>Search</span></button>

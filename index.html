<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --nav-bg: rgba(18, 18, 18, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- SHARED STYLES --- */
        .explicit { background: #888; color: #000; font-size: 9px; padding: 1px 3px; border-radius: 2px; margin-left: 4px; vertical-align: middle; font-weight: bold; }
        img { object-fit: cover; }

        /* --- DESKTOP SIDEBAR (Hidden on Mobile) --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
        .nav-btn { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; }
        .nav-btn.active { color: #fff; background: #333; border-left: 3px solid var(--apple-red); border-radius: 0 8px 8px 0; }

        /* --- MAIN VIEWPORT --- */
        .main-view { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }

        /* --- HERO SECTION --- */
        .hero { 
            width: 100%; height: 45vh; 
            background: linear-gradient(to bottom, rgba(0,0,0,0) 20%, #000 100%), 
                        url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg');
            background-size: cover; background-position: center 20%;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;
        }
        .concert-tag { background: rgba(255,255,255,0.15); width: fit-content; padding: 4px 10px; border-radius: 6px; font-size: 11px; margin-bottom: 12px; }

        /* --- MOBILE SPECIFIC (Auto-Switches) --- */
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(25px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 10px 0 30px; z-index: 2000; }
        .scroller { display: none; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scrollbar-width: none; }
        
        /* --- PC SPECIFIC (Auto-Switches) --- */
        .pc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px; }

        /* --- RESPONSIVE ENGINE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .hero { height: 35vh; padding: 20px; background-position: center; }
            .pc-grid { display: none; } /* Hide PC grid on mobile */
            .scroller { display: flex; } /* Show horizontal scroll on mobile */
            .section-label { padding: 20px; font-size: 22px; font-weight: 700; }
            .latest-card { display: flex; align-items: center; gap: 15px; padding: 0 20px; margin-bottom: 20px; }
        }

        @media (min-width: 769px) {
            .section-label { padding: 40px 40px 0; font-size: 28px; font-weight: 800; }
            .latest-card { display: none; } /* On PC, Bully is just part of the grid */
        }

        /* --- ALBUM STYLING --- */
        .album-item { cursor: pointer; transition: 0.3s; }
        .album-item:hover { transform: translateY(-5px); }
        .album-item img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .album-title { font-weight: 600; font-size: 14px; }
        .album-sub { color: #666; font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:2px; margin-bottom:40px;">LIBRARY</h2>
        <div class="nav-btn active">🎵 Music</div>
        <div class="nav-btn">🎬 Movies</div>
        <div class="nav-btn">🔍 Search</div>
    </nav>

    <main class="main-view">
        <div class="hero">
            <div class="concert-tag">🏟️ Upcoming Concerts</div>
            <h1 style="font-size: clamp(38px, 6vw, 72px); margin: 0; font-weight: 900;">Kanye West</h1>
        </div>

        <div class="section-label">Latest Release</div>
        <div class="latest-card">
            <img src="https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png" style="width:110px; height:110px; border-radius:12px;">
            <div>
                <p style="color: #888; font-size: 11px; font-weight: bold; margin: 0;">MAR 28, 2026</p>
                <h3 style="margin: 5px 0;">BULLY <span class="explicit">E</span></h3>
                <p style="color: #888; margin: 0; font-size: 14px;">18 songs</p>
                <div style="background:var(--apple-red); width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:8px; font-size:12px;">✓</div>
            </div>
        </div>

        <div class="section-label">Essential Albums</div>
        
        <div class="scroller">
            <div class="album-item" style="min-width: 160px;">
                <img src="https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg">
                <div class="album-title">The Life of Pablo <span class="explicit">E</span></div>
            </div>
            <div class="album-item" style="min-width: 160px;">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/03/Yeezus_album_cover.png">
                <div class="album-title">Yeezus <span class="explicit">E</span></div>
            </div>
            <div class="album-item" style="min-width: 160px;">
                <img src="https://m.media-amazon.com/images/I/91M9pUeHbeL._AC_SL1500_.png">
                <div class="album-title">MBDTF <span class="explicit">E</span></div>
            </div>
        </div>

        <div class="pc-grid">
            <div class="album-item">
                <img src="https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png">
                <div class="album-title">BULLY (2026)</div>
                <div class="album-sub">Latest Release</div>
            </div>
            <div class="album-item">
                <img src="https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg">
                <div class="album-title">The Life of Pablo</div>
                <div class="album-sub">Essential</div>
            </div>
            <div class="album-item">
                <img src="https://upload.wikimedia.org/wikipedia/en/0/03/Yeezus_album_cover.png">
                <div class="album-title">Yeezus</div>
                <div class="album-sub">Essential</div>
            </div>
            <div class="album-item">
                <img src="https://m.media-amazon.com/images/I/91M9pUeHbeL._AC_SL1500_.png">
                <div class="album-title">MBDTF</div>
                <div class="album-sub">Essential</div>
            </div>
        </div>
    </main>

    <nav class="mobile-nav">
        <div class="nav-item active" style="text-align:center; font-size:10px;">🏠<br>Home</div>
        <div class="nav-item" style="text-align:center; font-size:10px; color:#888;">🎬<br>Movies</div>
        <div class="nav-item" style="text-align:center; font-size:10px; color:#888;">🔍<br>Search</div>
    </nav>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LucasFlix - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; --gray: #a3a3a3; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: var(--red); font-size: 26px; font-weight: bold; text-decoration: none; }
        .main-container { padding: 100px 50px 0; }
        .focus-row { display: flex; gap: 20px; align-items: flex-start; }
        .hero-container { width: 700px; text-decoration: none; color: white; cursor: pointer; }
        .image-box { width: 100%; height: 400px; border-radius: 4px; overflow: hidden; position: relative; border: 2px solid transparent; transition: 0.3s; }
        
        /* Image 1: The eBay link (Crouching) */
        .normal-img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: 0.5s ease; z-index: 1; }
        /* Image 2: The Landscape Climb (Hover Zoom) */
        .zoom-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transform: scale(1.1); transition: 0.5s ease; z-index: 2; }
        
        .hero-container:hover .image-box { border-color: white; }
        .hero-container:hover .normal-img { opacity: 0; }
        .hero-container:hover .zoom-img { opacity: 1; transform: scale(1.0); }

        .hero-details { margin-top: 15px; }
        .meta { color: var(--gray); font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .description { font-size: 16px; line-height: 1.4; color: #ddd; max-width: 650px; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 25px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .btn-play { background: white; color: black; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo">LUCASFLIX</a></nav>
    <div class="main-container">
        <p style="font-weight:bold; font-size: 20px;">My List</p>
        <div class="focus-row">
            <div class="hero-container">
                <div class="image-box" onclick="window.location.href='spiderman-2002.html'">
                    <img src="https://i.ebayimg.com/images/g/Mf0AAOSwRfxmXaGY/s-l1200.jpg" class="normal-img">
                    <img src="https://m.media-amazon.com/images/M/MV5BMzY2OTgxOTE3OF5BMl5BanBnXkFtZTYwMTY3OTY3._V1_.jpg" class="zoom-img">
                </div>
                <div class="hero-details">
                    <div class="meta">Superheroes • 2002 • Movie • PG-13</div>
                    <div class="description">After being bitten by a genetically-altered spider, Peter Parker gains superhuman strength and the ability to fight crime.</div>
                    <div class="btn-row">
                        <button class="btn btn-play">▶ Play</button>
                        <button class="btn btn-info" onclick="window.location.href='spiderman-2002.html'">ⓘ More Info</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

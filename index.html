<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | GitHub Archive</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: 500; }
        .nav-link.active { color: #fff; background: #222; border-left: 3px solid var(--apple-red); }

        .main-view { flex: 1; overflow-y: scroll; padding-bottom: 140px; }
        .hero { width: 100%; height: 35vh; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }

        .section-label { padding: 20px; font-size: 22px; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 0 20px; }
        .album-card { cursor: pointer; text-align: center; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .track-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid #222; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; z-index: 6000; }
        audio { flex: 1; max-width: 500px; filter: invert(100%); margin-left: 20px; }
        
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:2px; margin-bottom:40px;">LUCAS HUB</h2>
        <div class="nav-link active" onclick="showTab('music')">🎵 Music</div>
        <div class="nav-link" onclick="showTab('movies')">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <section id="music-tab">
            <div class="hero"><h1 style="font-size: 48px; margin: 0;">Kanye West</h1></div>
            <div class="section-label">Your GitHub Library</div>
            <div class="grid" id="album-grid"></div>
        </section>
        
        <section id="movies-tab" style="display:none; padding: 40px;">
            <h1>Movies</h1>
            <div class="grid">
                <div class="album-card" onclick="location.href='IronMan-2008.html'"><img src="https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg"><p>Iron Man</p></div>
            </div>
        </section>
    </main>

    <div id="album-view" class="overlay">
        <div onclick="closeAlbum()" style="color:var(--apple-red); cursor:pointer; font-weight:bold; margin-bottom:20px;">‹ Back</div>
        <div id="album-content"></div>
    </div>

    <div class="player-bar">
        <div id="p-info" style="font-size: 14px; font-weight: bold;">Ready to Play</div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        // Update GITHUB_USER and REPO if your names are different
        const GITHUB_RAW = "https://raw.githubusercontent.com/LucasTheMaker/movie/main/music/";

        const albums = [
            {
                title: "Ye",
                year: 2018,
                img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg",
                tracks: [
                    { name: "I Thought About Killing You", file: "1._I_Thought_About_Killing_You.mp3" },
                    { name: "Yikes", file: "2._Yikes.mp3" },
                    { name: "All Mine", file: "3._All_Mine.mp3" },
                    { name: "Ghost Town", file: "6._Ghost_Town.mp3" }
                ]
            },
            {
                title: "Vultures 1",
                year: 2024,
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Vultures_1_cover.jpg/640px-Vultures_1_cover.jpg",
                tracks: [
                    { name: "STARS", file: "STARS_spotdown.org.mp3" },
                    { name: "BURN", file: "BURN_spotdown.org.mp3" },
                    { name: "CARNIVAL", file: "CARNIVAL_spotdown.org.mp3" }
                ]
            }
        ];

        function init() {
            const grid = document.getElementById('album-grid');
            albums.forEach((alb, i) => {
                grid.innerHTML += `<div class="album-card" onclick="openAlbum(${i})"><img src="${alb.img}"><p><b>${alb.title}</b></p></div>`;
            });
        }

        function openAlbum(index) {
            const alb = albums[index];
            document.getElementById('album-content').innerHTML = `
                <div style="text-align:center;"><img src="${alb.img}" style="width:250px; border-radius:15px; margin-bottom:20px;"><h1>${alb.title}</h1></div>
                <div style="max-width:600px; margin:auto; background:#111; padding:15px; border-radius:12px;">
                    ${alb.tracks.map(t => `<div class="track-row" onclick="playSong('${GITHUB_RAW}${t.file}', '${t.name}')"><span>${t.name}</span><span>▶</span></div>`).join('')}
                </div>`;
            document.getElementById('album-view').style.display = 'block';
        }

        function playSong(url, name) {
            const audio = document.getElementById('main-audio');
            audio.src = url;
            document.getElementById('p-info').innerText = "Playing: " + name;
            audio.play();
        }

        function showTab(id) {
            document.getElementById('music-tab').style.display = id === 'music' ? 'block' : 'none';
            document.getElementById('movies-tab').style.display = id === 'movies' ? 'block' : 'none';
        }

        function closeAlbum() { document.getElementById('album-view').style.display = 'none'; }
        init();
    </script>
</body>
</html>

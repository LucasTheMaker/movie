<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | Music</title>
    <style>
        :root { --apple-red: #fa233c; --bg: #000; --sidebar: #121212; --card-bg: #1c1c1e; --text-gray: #8e8e93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; }

        /* --- SIDEBAR --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #2c2c2e; padding: 30px 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: #2c2c2e; }

        /* --- MAIN VIEW --- */
        .main-view { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .hero { height: 40vh; background: linear-gradient(to bottom, rgba(0,0,0,0), #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }
        .scroller { display: flex; overflow-x: auto; gap: 20px; padding: 20px 40px; scrollbar-width: none; }
        .card { min-width: 180px; cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 3000; height: 90px; }
        .track-info-box { display: flex; align-items: center; gap: 15px; width: 40%; cursor: pointer; }
        .track-info-box img { width: 55px; height: 55px; border-radius: 6px; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .btn-group { display: flex; align-items: center; gap: 20px; }
        .control-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; opacity: 0.8; }

        /* Progress Bar */
        .progress-container { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px; font-size: 11px; color: var(--text-gray); font-variant-numeric: tabular-nums; }
        input[type="range"] { flex: 1; accent-color: var(--apple-red); cursor: pointer; height: 4px; border-radius: 2px; -webkit-appearance: none; background: #333; }

        /* --- OVERLAYS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; padding-bottom: 120px; }
        #full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        #full-player img { width: 80vw; max-width: 320px; border-radius: 20px; margin-bottom: 20px; }

        @media (max-width: 768px) { .sidebar { display: none; } .pc-only { display: none; } .track-info-box { width: 70%; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="color: var(--apple-red); font-weight: 900; margin-left: 15px; margin-bottom: 20px;">Lucas Hub</h2>
        <div class="nav-item active">🏠 Music</div>
        <div class="nav-item">🎬 Movies</div>
    </nav>

    <main class="main-view">
        <div class="hero"><h1 style="font-size: 50px; font-weight: 900;">Kanye West</h1></div>
        <div style="padding: 30px 40px 10px; font-weight: 700; font-size: 22px;">Discography</div>
        <div class="scroller" id="album-row"></div>
    </main>

    <div id="overlay" class="overlay">
        <div style="padding: 20px; position: sticky; top: 0; background: #000; z-index: 10;">
            <span onclick="closeOverlay()" style="cursor:pointer; font-weight:bold; color:var(--apple-red);">← Back</span>
        </div>
        <div id="overlay-header" style="text-align:center; padding: 20px;"></div>
        <div id="track-list" style="max-width: 800px; margin: 0 auto;"></div>
    </div>

    <div id="full-player">
        <span onclick="toggleFullPlayer()" style="position:absolute; top:20px; left:20px; font-size:30px;">⌄</span>
        <img id="f-img" src="">
        <h1 id="f-title" style="font-size: 24px;"></h1>
        <p id="f-album" style="color: var(--text-gray); margin-top: 5px;"></p>
        <div class="progress-container" style="margin-top: 40px; width: 85%;">
            <span id="f-current">0:00</span>
            <input type="range" id="f-seek" value="0" max="100" oninput="scrub(event)">
            <span id="f-total">0:00</span>
        </div>
        <div class="btn-group" style="margin-top: 30px; transform: scale(1.3);">
            <button class="control-btn" onclick="prevTrack()">⏮</button>
            <button class="control-btn" id="f-play-btn" onclick="togglePlay()" style="font-size: 40px;">⏸</button>
            <button class="control-btn" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info-box" onclick="toggleFullPlayer()">
            <img id="p-img" src="https://raw.githubusercontent.com/playermatrix/assets/main/placeholder.png">
            <div style="overflow: hidden;">
                <div id="p-title" style="font-weight:bold; font-size:14px; white-space:nowrap;">Select Song</div>
            </div>
        </div>
        <div class="controls">
            <div class="btn-group">
                <button id="repeat-btn" onclick="toggleRepeat()" style="background:none; border:none; color:#fff; opacity:0.5; font-size: 18px;">🔁</button>
                <button class="control-btn" id="play-btn" onclick="togglePlay()">⏸</button>
                <button class="control-btn" onclick="nextTrack()">⏭</button>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* NAVIGATION */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 60px 20px; flex-shrink: 0; }
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-top: 1px solid #333; display: none; padding: 10px 0; z-index: 1000; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
        }

        .nav-btn { padding: 12px; color: #aaa; cursor: pointer; border-radius: 8px; margin-bottom: 5px; font-size: 15px; }
        .nav-btn.active { background: #333; color: var(--apple-red); font-weight: bold; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--apple-red); }

        /* CONTENT */
        .main-view { flex: 1; overflow-y: auto; padding: 40px; position: relative; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { cursor: pointer; transition: 0.2s; text-align: center; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; border-radius: 12px; background: #222; object-fit: cover; }
        .music-card img { aspect-ratio: 1/1; }

        /* OVERLAYS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; padding: 40px 20px; }
        .back-link { color: var(--apple-red); font-weight: bold; cursor: pointer; font-size: 17px; margin-bottom: 30px; display: inline-block; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#555; letter-spacing:1px; margin-bottom:20px;">LIBRARY</h2>
        <div class="nav-btn active" id="d-music" onclick="nav('music')">🎵 Music</div>
        <div class="nav-btn" id="d-movies" onclick="nav('movies')">🎬 Movies</div>
        <div class="nav-btn" id="d-search" onclick="nav('search')">🔍 Search</div>
    </nav>

    <main class="main-view">
        <section id="music-page" class="page active">
            <h1>Music</h1>
            <div class="grid">
                <div class="card music-card" onclick="openArtist('Kanye West')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_6uYy9uXkX9O5m_oYm7-m0D7-Y8L9L9L9L9L9L9L9L9L9L9L9L9L9">
                    <p style="margin-top:10px; font-weight:600;">Kanye West</p>
                </div>
            </div>
            <div id="artist-profile" style="display:none; margin-top:40px;">
                <h2 id="profile-name"></h2>
                <div class="grid" id="full-grid"></div>
            </div>
        </section>

        <section id="movies-page" class="page">
            <h1>Movies</h1>
            <div class="grid">
                <div class="card" onclick="openMovie('Iron Man')">
                    <img src="https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg">
                    <p style="margin-top:10px; font-weight:600;">Iron Man</p>
                </div>
                <div class="card" onclick="openMovie('Spider-Man')">
                    <img src="https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg">
                    <p style="margin-top:10px; font-weight:600;">Spider-Man</p>
                </div>
            </div>
        </section>

        <section id="search-page" class="page">
            <h1>Search</h1>
            <input type="text" id="search-input" style="width:100%; padding:15px; border-radius:10px; border:1px solid #333; background:#222; color:#fff;" placeholder="Search..." onkeyup="search()">
            <div id="search-results" style="margin-top:20px;"></div>
        </section>
    </main>

    <nav class="mobile-nav">
        <div class="nav-item active" id="m-music" onclick="nav('music')">🎵<br>Music</div>
        <div class="nav-item" id="m-movies" onclick="nav('movies')">🎬<br>Movies</div>
        <div class="nav-item" id="m-search" onclick="nav('search')">🔍<br>Search</div>
    </nav>

    <div id="detail-overlay" class="overlay">
        <span class="back-link" onclick="closeOverlay()">‹ Back</span>
        <div id="detail-content"></div>
    </div>

    <script>
        const musicDB = {
            "Kanye West": {
                albums: [
                    { title: "BULLY", year: 2026, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png", tracks: ["Sisters and Brothers", "Father", "Bully", "Preacher Man", "Beauty and the Beast"] },
                    { title: "The Life of Pablo", year: 2016, img: "https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg", tracks: ["Ultralight Beam", "Father Stretch My Hands Pt. 1", "Waves", "Wolves"] }
                ]
            }
        };

        const movieDB = {
            "Iron Man": { year: 2008, dist: "Marvel Studios / Paramount", img: "https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg", info: "After being held captive in an Afghan cave, billionaire engineer Tony Stark creates a unique weaponized suit of armor to fight evil." },
            "Spider-Man": { year: 2002, dist: "Columbia Pictures", img: "https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg", info: "After being bitten by a genetically modified spider, a shy teenager gains spider-like abilities that he uses to fight injustice as a masked superhero." }
        };

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
            document.querySelectorAll('.nav-btn, .nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('d-'+id).classList.add('active');
            document.getElementById('m-'+id).classList.add('active');
        }

        function openArtist(name) {
            const art = musicDB[name];
            const profile = document.getElementById('artist-profile');
            profile.style.display = 'block';
            document.getElementById('profile-name').innerText = name;
            const grid = document.getElementById('full-grid');
            grid.innerHTML = art.albums.map((alb, i) => `<div class="card music-card" onclick="showMusicDetails('${name}', ${i})"><img src="${alb.img}"><p>${alb.title}</p></div>`).join('');
            window.scrollTo(0, 500);
        }

        function showMusicDetails(artist, i) {
            const alb = musicDB[artist].albums[i];
            const overlay = document.getElementById('detail-content');
            overlay.innerHTML = `<div style="text-align:center;"><img src="${alb.img}" style="width:250px; border-radius:15px;"><h1>${alb.title}</h1><p>${artist}</p><div style="text-align:left; max-width:500px; margin:auto; background:#111; padding:15px; border-radius:10px;">${alb.tracks.map((t, idx) => `<p>${idx+1}. ${t}</p>`).join('')}</div></div>`;
            document.getElementById('detail-overlay').style.display = 'block';
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas The Maker | Hub</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; margin: 0; padding: 0; text-align: center; }
        
        /* Tab Navigation */
        .tab-bar { display: flex; justify-content: center; background: #111; padding: 15px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab-btn { background: none; border: none; color: #888; font-size: 16px; font-weight: 600; margin: 0 20px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: #fa2d48; border-bottom: 2px solid #fa2d48; }

        /* Content Sections */
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        /* Music Grid Styles */
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .album-card img { width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .album-card h4 { margin: 10px 0 2px; font-size: 14px; }
        .album-card p { color: #888; font-size: 12px; margin: 0; }

        /* Movie Frame */
        iframe { width: 100%; height: 90vh; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="openTab('music')"> Music</button>
        <button class="tab-btn" onclick="openTab('movies')">🎬 Movies</button>
    </div>

    <div id="music" class="tab-content active">
        <h1>Kanye West</h1>
        <p style="color: #888;">Artist • Verified 2026</p>
        <div class="music-grid">
            <div class="album-card">
                <img src="https://m.media-amazon.com/images/I/71R3OitAovL.jpg">
                <h4>The College Dropout</h4>
                <p>2004</p>
            </div>
            <div class="album-card">
                <img src="https://m.media-amazon.com/images/I/719hE1Z7FzL.jpg">
                <h4>Late Registration</h4>
                <p>2005</p>
            </div>
             <div class="album-card">
                <img src="https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.jpg">
                <h4>BULLY [E]</h4>
                <p>2026</p>
            </div>
        </div>
    </div>

    <div id="movies" class="tab-content">
        <iframe src="https://lucasthemaker.github.io/movie/index.html"></iframe>
    </div>

    <script>
        function openTab(tabName) {
            var i, content, tabs;
            content = document.getElementsByClassName("tab-content");
            for (i = 0; i < content.length; i++) { content[i].classList.remove("active"); }
            
            tabs = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
            
            document.getElementById(tabName).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026 Archive</title>
    <style>
        :root { --apple-red: #fa2d48; --itunes-grey: #1c1c1e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; }

        /* --- MOBILE DESIGN (Apple Music iOS) --- */
        @media (max-width: 768px) {
            .desktop-only { display: none; }
            .mobile-nav { position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); display: flex; padding: 15px 0; border-top: 0.5px solid #333; z-index: 1000; }
            .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; }
            .nav-item.active { color: var(--apple-red); }
            .content-container { padding: 40px 20px 100px; }
            .album-grid { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
            .album-grid::-webkit-scrollbar { display: none; }
            .album-card { min-width: 160px; }
        }

        /* --- DESKTOP DESIGN (iTunes / Music App) --- */
        @media (min-width: 769px) {
            .mobile-only { display: none; }
            body { display: flex; height: 100vh; overflow: hidden; }
            
            /* iTunes Sidebar */
            .itunes-sidebar { width: 240px; background: #111; border-right: 0.5px solid #333; padding: 60px 20px; display: flex; flex-direction: column; gap: 10px; }
            .sidebar-item { padding: 8px 12px; border-radius: 6px; font-size: 14px; color: #ccc; cursor: pointer; }
            .sidebar-item:hover { background: #222; }
            .sidebar-item.active { background: #333; color: var(--apple-red); font-weight: bold; }
            
            /* Desktop Layout */
            .main-content { flex: 1; overflow-y: auto; padding: 40px; }
            .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
            
            /* Top Playback Bar */
            .itunes-top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #222; display: flex; align-items: center; justify-content: center; border-bottom: 0.5px solid #333; z-index: 2000; }
            .playback-display { background: #000; padding: 4px 60px; border-radius: 4px; border: 1px solid #444; font-size: 12px; }
        }

        /* Common Elements */
        .album-card img { width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .album-title { font-size: 14px; font-weight: 600; margin: 8px 0 2px; }
        .album-sub { color: #888; font-size: 12px; }

        /* Modal / Deep Dive View */
        .deep-dive { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; overflow-y: auto; padding-top: 50px; }
    </style>
</head>
<body>

    <div class="itunes-top-bar desktop-only">
        <div class="playback-display">Kanye West — BULLY</div>
    </div>

    <div class="itunes-sidebar desktop-only">
        <div style="font-size: 12px; color: #555; font-weight: bold; margin-bottom: 10px;">APPLE MUSIC</div>
        <div class="sidebar-item active">Listen Now</div>
        <div class="sidebar-item">Browse</div>
        <div class="sidebar-item">Radio</div>
        <div style="font-size: 12px; color: #555; font-weight: bold; margin-top: 20px; margin-bottom: 10px;">LIBRARY</div>
        <div class="sidebar-item">Artists</div>
        <div class="sidebar-item">Albums</div>
        <div class="sidebar-item">Songs</div>
    </div>

    <div class="main-content content-container">
        <h1 style="font-size: 34px; margin-bottom: 20px;">Kanye West</h1>
        
        <h2 style="margin-top: 30px;">Essentials</h2>
        <div class="album-grid" id="essentialRow"></div>

        <h2 style="margin-top: 30px;">Albums</h2>
        <div class="album-grid" id="fullRow"></div>
    </div>

    <div class="mobile-nav mobile-only">
        <div class="nav-item"><span>🎬</span><br>Movies</div>
        <div class="nav-item active"><span>🎵</span><br>Music</div>
        <div class="nav-item"><span>🔍</span><br>Search</div>
    </div>

    <div id="deepDive" class="deep-dive">
        <div style="padding: 20px; color: var(--apple-red); cursor: pointer;" onclick="closeAlbum()">‹ Back</div>
        <div id="diveContent" style="padding: 20px;"></div>
    </div>

    <script>
        const discography = [
            { title: "BULLY", year: 2026, img: "https://images.genius.com/f047464654929851722650c7038e235e.1000x1000x1.jpg", essential: true, dist: "YZY", tracks: ["PREACHER MAN", "BEAUTY AND THE BEAST", "SISTERS AND BROTHERS", "FATHER", "BULLY"] },
            { title: "The Life of Pablo", year: 2016, img: "https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg", essential: true, dist: "G.O.O.D / Def Jam", tracks: ["Ultralight Beam", "FSMH Pt. 1", "Famous", "Waves", "Wolves"] },
            { title: "MBDTF", year: 2010, img: "https://m.media-amazon.com/images/I/91M9pUeHbeL.jpg", essential: true, dist: "Roc-A-Fella / Def Jam", tracks: ["Dark Fantasy", "Power", "Monster", "Runaway"] },
            { title: "Kids See Ghosts", year: 2018, img: "https://m.media-amazon.com/images/I/71E3v1-E9jL.jpg", essential: true, dist: "G.O.O.D / Def Jam", tracks: ["Feel the Love", "Fire", "Reborn", "Cudi Montage"] },
            { title: "Late Registration", year: 2005, img: "https://m.media-amazon.com/images/I/719hE1Z7FzL.jpg", essential: true, dist: "Roc-A-Fella / Def Jam", tracks: ["Heard 'Em Say", "Gold Digger", "Touch the Sky"] }
        ];

        function render() {
            const er = document.getElementById('essentialRow');
            const fr = document.getElementById('fullRow');
            discography.forEach((alb, i) => {
                const card = `
                    <div class="album-card" onclick="openAlbum(${i})">
                        <img src="${alb.img}">
                        <div class="album-title">${alb.title}</div>
                        <div class="album-sub">${alb.year}</div>
                    </div>`;
                fr.innerHTML += card;
                if(alb.essential) er.innerHTML += card;
            });
        }

        function openAlbum(index) {
            const alb = discography[index];
            const dive = document.getElementById('deepDive');
            const content = document.getElementById('diveContent');
            
            content.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:30px;">
                    <img src="${alb.img}" style="width:280px; border-radius:12px;">
                    <div style="flex:1; min-width:300px;">
                        <h1 style="margin:0;">${alb.title}</h1>
                        <p style="color:var(--apple-red); font-size:18px;">Kanye West</p>
                        <p style="color:#666; font-size:13px;">${alb.year} • LOSSLESS • ${alb.dist}</p>
                        <div style="margin-top:30px;">
                            ${alb.tracks.map((t, idx) => `
                                <div style="display:flex; padding:12px 0; border-bottom:0.5px solid #222;">
                                    <span style="width:30px; color:#555;">${idx+1}</span>
                                    <span style="flex:1;">${t}</span>
                                    <span style="color:#555;">3:45</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            dive.style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeAlbum() {
            document.getElementById('deepDive').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onload = render;
    </script>
</body>
</html>

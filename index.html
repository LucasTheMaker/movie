<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | BULLY 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --card: #111; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; }
        
        .hero { height: 40vh; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 20px; }
        .section-label { padding: 20px; font-size: 22px; font-weight: 800; }
        
        /* Album Display */
        .latest-release { display: flex; gap: 20px; padding: 0 20px; align-items: center; background: var(--card); margin: 0 20px; border-radius: 15px; padding: 15px; cursor: pointer; }
        .latest-release img { width: 100px; height: 100px; border-radius: 10px; }

        /* Tracklist */
        .track-row { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .track-row:active { background: #222; }
        
        /* Fixed Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 15px; display: flex; align-items: center; flex-direction: column; gap: 10px; z-index: 1000; }
        audio { width: 100%; filter: invert(100%); height: 35px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-size: 42px; margin: 0;">Kanye West</h1>
    </div>

    <div class="section-label">Latest Release</div>
    <div class="latest-release">
        <img src="https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png">
        <div>
            <p style="color: #888; font-size: 11px; font-weight: bold; margin: 0;">MAR 28, 2026</p>
            <h3 style="margin: 5px 0;">BULLY</h3>
            <p style="color: #666; font-size: 13px; margin: 0;">14 songs • Independent</p>
        </div>
    </div>

    <div class="section-label">Tracklist</div>
    <div id="tracklist">
        </div>

    <div class="player-bar">
        <div id="p-title" style="font-weight: bold; font-size: 14px;">Select a song to play</div>
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        // These links come directly from your Discord chat history (March 28th)
        const bullyTracks = [
            { name: "KING", url: "https://cdn.discordapp.com/attachments/1428576769862271091/103/KING_spotdown.org.mp3" },
            { name: "THIS A MUST", url: "https://cdn.discordapp.com/attachments/1428576769862271091/104/THIS_A_MUST_spotdown.org.mp3" },
            { name: "FATHER (feat. Travis Scott)", url: "https://cdn.discordapp.com/attachments/1428576769862271091/105/FATHER_spotdown.org.mp3" },
            { name: "ALL THE LOVE", url: "https://cdn.discordapp.com/attachments/1428576769862271091/106/ALL_THE_LOVE_spotdown.org.mp3" },
            { name: "PUNCH DRUNK", url: "https://cdn.discordapp.com/attachments/1428576769862271091/107/PUNCH_DRUNK_spotdown.org.mp3" },
            { name: "WHATEVER WORKS", url: "https://cdn.discordapp.com/attachments/1428576769862271091/108/WHATEVER_WORKS_spotdown.org.mp3" },
            { name: "MAMA'S FAVORITE", url: "https://cdn.discordapp.com/attachments/1428576769862271091/109/MAMAS_FAVORITE_spotdown.org.mp3" },
            { name: "SISTERS AND BROTHERS", url: "https://cdn.discordapp.com/attachments/1428576769862271091/110/SISTERS_AND_BROTHERS_spotdown.org.mp3" },
            { name: "BULLY (feat. CeeLo Green)", url: "https://cdn.discordapp.com/attachments/1428576769862271091/111/BULLY_spotdown.org.mp3" },
            { name: "WHITE LINES", url: "https://cdn.discordapp.com/attachments/1428576769862271091/114/WHITE_LINES_spotdown.org.mp3" }
        ];

        const listDiv = document.getElementById('tracklist');
        const audio = document.getElementById('audio-player');
        const titleDisplay = document.getElementById('p-title');

        bullyTracks.forEach((track, i) => {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.innerHTML = `<span>${i+1}. ${track.name}</span><span>▶</span>`;
            row.onclick = () => {
                audio.src = track.url;
                titleDisplay.innerText = "Playing: " + track.name;
                audio.play();
            };
            listDiv.appendChild(row);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Movies - Home</title>
    <style>
        :root { --bg: #000; --red: #e50914; --card-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* Header */
        .header { padding: 40px 20px 10px; display: flex; align-items: center; justify-content: space-between; }
        .greeting { font-size: 24px; font-weight: bold; }
        .icon-group { display: flex; gap: 20px; font-size: 20px; }

        /* Pills */
        .pills { display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; }
        .pill { background: rgba(255,255,255,0.1); border: 1px solid #444; padding: 8px 18px; border-radius: 20px; font-size: 14px; white-space: nowrap; }

        /* Rows */
        .section-title { font-size: 18px; font-weight: bold; padding: 25px 20px 12px; }
        .row { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; }
        .row::-webkit-scrollbar { display: none; }

        /* Cards */
        .card { 
            min-width: 140px; height: 210px; border-radius: 6px; 
            background-size: cover; background-position: center; 
            position: relative; cursor: pointer; transition: 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .badge { 
            position: absolute; bottom: 0; width: 100%; background: var(--red); 
            color: white; font-size: 10px; text-align: center; padding: 4px 0; 
            border-radius: 0 0 6px 6px; font-weight: bold;
        }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222; z-index: 100;
        }
        .nav-item { text-align: center; font-size: 10px; color: #777; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="greeting">For Lucas</div>
        <div class="icon-group"><span>📥</span> <span>🔍</span></div>
    </div>

    <div class="pills">
        <div class="pill">Shows</div>
        <div class="pill">Movies</div>
        <div class="pill">Categories ⌵</div>
    </div>

    <p class="section-title">Today's Top Picks for You</p>
    <div class="row">
        <div class="card" onclick="window.location.href='spiderman-2002.html'" style="background-image: url('https://m.media-amazon.com/images/M/MV5BMzY2OTgxOTE3OF5BMl5BanBnXkFtZTYwMTY3OTY3._V1_.jpg');">
            <div class="badge">Recently Added</div>
        </div>
        <div class="card" style="background-image: url('https://m.media-amazon.com/images/I/51B6-Yc6RGL._AC_UF894,1000_QL80_.jpg');"></div>
        <div class="card" style="background-image: url('https://m.media-amazon.com/images/I/51X57o4KqHL._AC_UF894,1000_QL80_.jpg');"></div>
    </div>

    <p class="section-title">From the Big Screen to Your Screen</p>
    <div class="row">
        <div class="card" onclick="window.location.href='IronMan-2008.html'" style="background-image: url('https://m.media-amazon.com/images/M/MV5BMTczNTI2ODUwOF5BMl5BanBnXkFtZTcwMTU0NTIzMw@@._V1_.jpg');"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠<br>Home</div>
        <div class="nav-item">🔥<br>New & Hot</div>
        <div class="nav-item">👤<br>My Netflix</div>
    </div>

</body>
</html>

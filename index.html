<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Audio - Premium</title>
    <style>
        :root { --accent: #fa243c; --bg: #000; --card: #1c1c1e; --gray: #8e8e93; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        /* Navigation & Pages */
        .page { display: none; }
        .active-page { display: block; }
        
        /* Transition for Album View */
        #album-detail-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; overflow-y: auto; display: none; }

        /* Header */
        .header { padding: 40px 20px 10px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); sticky: top; z-index: 100; }
        .logo-text { font-size: 28px; font-weight: 800; }

        /* Featured Section */
        .featured-hero { 
            margin: 20px; height: 300px; border-radius: 12px;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent), url('https://upload.wikimedia.org/wikipedia/en/4/4d/The_Life_of_Pablo.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            cursor: pointer;
        }

        /* Album View Styles */
        .back-btn { padding: 20px; color: var(--accent); font-weight: 600; cursor: pointer; }
        .album-header { text-align: center; padding: 20px; }
        .big-art { width: 220px; height: 220px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .album-title { font-size: 24px; font-weight: 700; margin: 0; }
        .album-maker { color: var(--gray); font-size: 18px; margin-top: 5px; }
        
        .play-bar-main { 
            display: flex; justify-content: center; gap: 20px; margin: 25px 0; 
        }
        .apple-play-btn { 
            background: #2c2c2e; color: var(--accent); border: none; 
            padding: 12px 60px; border-radius: 8px; font-size: 18px; font-weight: bold; 
        }

        /* Tracklist */
        .track-list { padding: 0 20px; }
        .track-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 0.5px solid #222; }
        .track-num { width: 30px; color: var(--gray); font-size: 14px; }
        .track-info { flex-grow: 1; }
        .track-name { font-size: 16px; font-weight: 500; display: block; }
        .track-artists { font-size: 13px; color: var(--gray); }

        /* Shared Components */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 0.5px solid #333; z-index: 4000; }
        .nav-item { text-align: center; font-size: 11px; color: var(--gray); cursor: pointer; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div id="home-page" class="page active-page">
        <div class="header"><div class="logo-text">Listen Now</div></div>
        
        <div class="featured-hero" onclick="openAlbum('The Life of Pablo', 'Kanye West', 'https://upload.wikimedia.org/wikipedia/en/4/4d/The_Life_of_Pablo.jpg')">
            <div style="color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 5px;">FEATURED ALBUM</div>
            <div class="album-title">The Life of Pablo</div>
            <div style="color: #ccc;">Kanye West • Album Maker</div>
        </div>

        <p style="padding: 0 20px; font-size: 22px; font-weight: 700;">Recently Added</p>
        <div style="padding: 0 20px; color: var(--gray);">Tap the featured album to see the tracklist.</div>
    </div>

    <div id="album-detail-view">
        <div class="back-btn" onclick="closeAlbum()">❮ Library</div>
        
        <div class="album-header">
            <img id="detail-art" class="big-art" src="">
            <h1 id="detail-title" class="album-title"></h1>
            <div id="detail-maker" class="album-maker"></div>
            
            <div class="play-bar-main">
                <button class="apple-play-btn" onclick="alert('Playing Album...')">▶ Play</button>
            </div>
        </div>

        <div class="track-list" id="tracklist-container">
            </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
        <div class="nav-item">🔍<br>Search</div>
        <div class="nav-item">🎵<br>Library</div>
        <div class="nav-item">👤<br>Lucas</div>
    </div>

    <script>
        // Album Data
        const trackData = {
            "The Life of Pablo": [
                { num: 1, name: "Ultralight Beam", artists: "Kanye West, Chance the Rapper, Kirk Franklin" },
                { num: 2, name: "Father Stretch My Hands Pt. 1", artists: "Kanye West, Kid Cudi" },
                { num: 3, name: "Pt. 2", artists: "Kanye West, Desiigner" },
                { num: 4, name: "Famous", artists: "Kanye West, Rihanna, Swizz Beatz" },
                { num: 5, name: "Feedback", artists: "Kanye West" },
                { num: 6, name: "Wolves", artists: "Kanye West, Sia, Vic Mensa" }
            ]
        };

        function openAlbum(title, maker, art) {
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-maker').innerText = maker + " • Album Maker";
            document.getElementById('detail-art').src = art;
            
            const container = document.getElementById('tracklist-container');
            container.innerHTML = ""; // Clear old tracks

            if (trackData[title]) {
                trackData[title].forEach(track => {
                    container.innerHTML += `
                        <div class="track-item" onclick="alert('Playing ${track.name}')">
                            <div class="track-num">${track.num}</div>
                            <div class="track-info">
                                <span class="track-name">${track.name}</span>
                                <span class="track-artists">${track.artists}</span>
                            </div>
                            <div style="color: var(--accent); font-size: 20px;">+</div>
                        </div>
                    `;
                });
            }

            document.getElementById('album-detail-view').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closeAlbum() {
            document.getElementById('album-detail-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>

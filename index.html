<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; --card-bg: #151515; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: #fff; margin: 0; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- NAVIGATION --- */
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid #222; padding: 40px 20px; flex-shrink: 0; z-index: 100; }
        .nav-item { padding: 14px; color: #888; border-radius: 10px; margin-bottom: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-item:hover { color: #fff; background: #222; }
        .nav-item.active { color: #fff; background: #222; border-left: 4px solid var(--apple-red); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); border-top: 1px solid #222; display: none; justify-content: space-around; padding: 10px 0 30px; z-index: 1000; }

        /* --- MAIN CONTENT --- */
        .main-view { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; position: relative; }
        .tab-content { display: none; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        .hero { 
            height: 45vh; background: linear-gradient(to bottom, transparent, #000 95%), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg');
            background-size: cover; background-position: center 20%; display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;
        }

        .section-label { padding: 30px 40px 15px; font-size: 22px; font-weight: 800; color: #fff; }
        .scroller { 
            display: flex; overflow-x: auto; gap: 20px; padding: 0 40px 20px; 
            scrollbar-width: none; -ms-overflow-style: none; 
        }
        .scroller::-webkit-scrollbar { display: none; }

        /* --- CARDS --- */
        .card { 
            min-width: 200px; max-width: 200px; background: var(--card-bg); 
            padding: 15px; border-radius: 16px; transition: 0.3s; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); background: #202020; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; margin-bottom: 12px; object-fit: cover; background: #222; }

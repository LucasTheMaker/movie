<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --itunes-bg: #111; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }

        /* --- DUAL INTERFACE LOGIC --- */
        @media (max-width: 768px) {
            .desktop-ui { display: none; }
            .mobile-ui { display: flex; position: fixed; bottom: 0; width: 100%; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-top: 0.5px solid #333; z-index: 1000; padding: 10px 0; }
            .content { padding: 40px 20px 100px; }
            .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; }
        }

        @media (min-width: 769px) {
            .mobile-ui { display: none; }
            body { display: flex; height: 100vh; }
            .sidebar { width: 240px; background: #111; border-right: 0.5px solid #333; padding: 60px 20px; }
            .content { flex: 1; overflow-y: auto; padding: 60px 40px; }
            .top-player { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #222; border-bottom: 0.5px solid #333; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        }

        /* --- SHARED STYLES --- */
        .page { display: none; }
        .page.active { display: block; }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; margin-top: 20px; }
        .album-card { cursor: pointer; transition: transform 0.2s; }
        .album-card:hover { transform: translateY(-5px); }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; background: #222; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .pfp-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .artist-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--apple-red); }

        .nav-link { padding: 10px; color: #ccc; cursor: pointer; display: block; }
        .nav-link.active { color: var(--apple-red); font-weight: bold; }

        /* Full Album View */
        .album-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; overflow-y: auto; padding: 40px 20px; }
    </style>
</head>
<body>

    <div class="top-player desktop-ui">
        <div style="background:#000; border:1px solid #444; border-radius:4px; padding:4px 50px; font-size:12px;">Music Player — Select a Track</div>
    </div>

    <div class="sidebar desktop-ui">
        <h3 style="color:#555; font-size:12px; margin-bottom:20px;">LIBRARY</h3>
        <div class="nav-link" onclick="switchMainTab('movies')">🎬 Movies</div>
        <div class="nav-link active" onclick="switchMainTab('music')">🎵 Music</div>
        <div class="nav-link">🔍 Search</div>
    </div>

    <div class="content">
        <div id="moviesPage" class="page">
            <h1 style="font-size: 34px;">Movies</h1>
            <iframe id="movieFrame" style="width:100%; height:80vh; border:none; border-radius:15px; margin-top:20px;"></iframe>
        </div>

        <div id="musicPage" class="page active">
            <h1 style="font-size: 34px;">Artists</h1>
            <div class="album-grid" id="artistList">
                <div class="album-card" onclick="loadArtist('Kanye West')">
                    <img src="https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg">
                    <p style="text-align:center; font-weight:bold; margin-top:10px;">Kanye West</p>
                </div>
            </div>

            <div id="artistDetail" style="display:none; margin-top:40px;">
                <div class="pfp-header">
                    <img id="artistPfp" class="artist-pfp">
                    <h2 id="artistName" style="font-size:32px; margin:0;"></h2>
                </div>
                <h3>Essential Albums</h3>
                <div class="album-grid" id="artistAlbums"></div>
            </div>
        </div>
    </div>

    <div class="mobile-ui">
        <div class="nav-item" onclick="switchMainTab('movies')">🎬<br>Movies</div>
        <div class="nav-item active" onclick="switchMainTab('music')">🎵<br>Music</div>
        <div class="nav-item">🔍<br>Search</div>
    </div>

    <div id="albumView" class="album-view">
        <div style="color:var(--apple-red); margin-bottom:20px; cursor:pointer;" onclick="closeAlbum()">‹ Back</div>
        <div id="albumContent"></div>
    </div>

    <script>
        const data = {
            "Kanye West": {
                pfp: "https://m.media-amazon.com/images/M/MV5BMjExOTY3NzExM15BMl5BanBnXkFtZTcwOTg4MzE2Mw@@._V1_.jpg",
                albums: [
                    { title: "BULLY", year: 2026, img: "https://images.genius.com/f047464654929851722650c7038e235e.1000x1000x1.jpg", dist: "YZY", tracks: ["PREACHER MAN", "BEAUTY AND THE BEAST", "SISTERS AND BROTHERS", "FATHER"] },
                    { title: "The Life of Pablo", year: 2016, img: "https://m.media-amazon.com/images/I/61q3K-o1E6L.jpg", dist: "Def Jam", tracks: ["Ultralight Beam", "FSMH Pt. 1", "Famous", "Waves"] },
                    { title: "MBDTF", year: 2010, img: "https://m.media-amazon.com/images/I/91M9pUeHbeL.jpg", dist: "Roc-A-Fella", tracks: ["Dark Fantasy", "Power", "Monster", "Runaway"] }
                ]
            }
        };

        function switchMainTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link, .nav-item').forEach(n => n.classList.remove('active'));
            
            if(tab === 'movies') {
                document.getElementById('moviesPage').classList.add('active');
                document.getElementById('movieFrame').src = "https://lucasthemaker.github.io/movie/index.html";
            } else {
                document.getElementById('musicPage').classList.add('active');
            }
        }

        function loadArtist(name) {
            const artist = data[name];
            document.getElementById('artistList').style.display = 'none';
            document.getElementById('artistDetail').style.display = 'block';
            document.getElementById('artistName').innerText = name;
            document.getElementById('artistPfp').src = artist.pfp;
            
            const albumRow = document.getElementById('artistAlbums');
            albumRow.innerHTML = "";
            artist.albums.forEach((alb, i) => {
                albumRow.innerHTML += `
                    <div class="album-card" onclick="viewAlbumDetails('${name}', ${i})">
                        <img src="${alb.img}">
                        <p style="font-size:14px; margin-top:8px; font-weight:600;">${alb.title}</p>
                        <p style="color:#888; font-size:12px;">${alb.year}</p>
                    </div>`;
            });
        }

        function viewAlbumDetails(artistName, index) {
            const alb = data[artistName].albums[index];
            const content = document.getElementById('albumContent');
            content.innerHTML = `
                <div style="text-align:center;">
                    <img src="${alb.img}" style="width:250px; border-radius:15px;">
                    <h2>${alb.title}</h2>
                    <p style="color:var(--apple-red); font-weight:bold;">${artistName}</p>
                    <div style="background:#111; border-radius:15px; padding:20px; text-align:left; margin-top:30px;">
                        <p><b>Distributor:</b> ${alb.dist}</p>
                        <hr style="border:0.5px solid #333;">
                        ${alb.tracks.map((t, idx) => `<p>${idx+1}. ${t} <span style="float:right; color:#555;">3:45</span></p>`).join('')}
                    </div>
                </div>`;
            document.getElementById('albumView').style.display = "block";
        }

        function closeAlbum() { document.getElementById('albumView').style.display = "none"; }
    </script>
</body>
</html>

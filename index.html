<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucas Hub | 2026</title>
    <style>
        :root { --apple-red: #fa2d48; --bg: #000; --sidebar: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 60px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 12px; color: #888; cursor: pointer; border-radius: 8px; margin-bottom: 8px; font-weight: 500; }
        .nav-link.active { color: #fff; background: #222; border-left: 3px solid var(--apple-red); }

        .main-view { flex: 1; overflow-y: scroll; padding-bottom: 120px; position: relative; }
        .hero { width: 100%; height: 35vh; background: linear-gradient(transparent, #000), url('https://raw.githubusercontent.com/playermatrix/assets/main/ye_banner_edited.jpg') center/cover; display: flex; align-items: flex-end; padding: 40px; }

        .section-label { padding: 20px; font-size: 22px; font-weight: 800; }
        .scroller { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        
        .album-card { min-width: 160px; cursor: pointer; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid #222; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; z-index: 3000; }
        .track-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        .track-info img { width: 50px; height: 50px; border-radius: 6px; }
        audio { flex: 1; max-width: 400px; filter: invert(100%); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .track-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        
        #link-btn { background: var(--apple-red); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size:11px; color:#444; letter-spacing:2px; margin-bottom:40px;">LUCAS HUB</h2>
        <div class="nav-link active" onclick="showTab('music')">🎵 Music</div>
        <div class="nav-link" onclick="showTab('movies')">🎬 Movies</div>
        
        <input type="file" id="music-upload" webkitdirectory directory multiple style="display:none">
        <button id="link-btn" onclick="document.getElementById('music-upload').click()">LINK MUSIC FOLDER</button>
    </nav>

    <main class="main-view">
        <section id="music-tab">
            <div class="hero"><h1>Kanye West</h1></div>
            <div class="section-label">Library</div>
            <div class="scroller" id="album-list"></div>
        </section>

        <section id="movies-tab" style="display:none; padding:40px;">
            <h1>Movies</h1>
            <div class="scroller">
                <div class="album-card"><img src="https://m.media-amazon.com/images/I/91N9mX6K8HL._AC_SL1500_.jpg"><p>Iron Man</p></div>
                <div class="album-card"><img src="https://m.media-amazon.com/images/I/61-6v-f9u9L._AC_SL1000_.jpg"><p>Spider-Man</p></div>
            </div>
        </section>
    </main>

    <div id="album-view" class="overlay">
        <div onclick="closeAlbum()" style="color:var(--apple-red); cursor:pointer; font-weight:bold; margin-bottom:20px;">‹ Back</div>
        <div id="album-content"></div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <img id="p-img" src="">
            <div style="overflow: hidden;">
                <div id="p-title" style="font-weight:bold; font-size:14px; white-space: nowrap;">Waiting...</div>
                <div id="p-alb" style="font-size:11px; color:#666;">Select a track</div>
            </div>
        </div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        const albums = [
            { title: "BULLY", year: 2026, img: "https://raw.githubusercontent.com/playermatrix/assets/main/bully_cover.png", tracks: ["SISTERS AND BROTHERS", "FATHER", "PUNCH DRUNK", "WHATEVER WORKS", "MAMA'S FAVORITE", "BULLY", "PREACHER MAN", "BEAUTY AND THE BEAST", "LAST BREATH", "THIS A MUST", "ALL THE LOVE", "CIRCLES", "DAMN", "WHITE LINES"] },
            { title: "Vultures 1", year: 2024, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Vultures_1_cover.jpg/640px-Vultures_1_cover.jpg", tracks: ["STARS", "KEYS TO MY LIFE", "PAID", "TALKING", "BACK TO ME", "HOODRAT", "DO IT", "PAPERWORK", "BURN", "FUK SUMN", "VULTURES", "CARNIVAL", "BEG FORGIVENESS", "PROBLEMATIC", "KING"] },
            { title: "Ye", year: 2018, img: "https://upload.wikimedia.org/wikipedia/en/7/74/Ye_album_cover.jpg", tracks: ["I Thought About Killing You", "Yikes", "All Mine", "Wouldn't Leave", "No Mistakes", "Ghost Town", "Violent Crimes"] }
        ];

        let localMusic = {};

        document.getElementById('music-upload').onchange = function(e) {
            for (let file of e.target.files) {
                localMusic[file.name.toLowerCase()] = URL.createObjectURL(file);
            }
            alert("Music linked!");
        };

        function init() {
            const list = document.getElementById('album-list');
            albums.forEach((alb, i) => {
                list.innerHTML += `<div class="album-card" onclick="openAlbum(${i})"><img src="${alb.img}"><p style="font-weight:bold;margin:0;">${alb.title}</p></div>`;
            });
        }

        function openAlbum(index) {
            const alb = albums[index];
            document.getElementById('album-content').innerHTML = `
                <div style="text-align:center;"><img src="${alb.img}" style="width:250px; border-radius:15px; margin-bottom:20px;"><h1>${alb.title}</h1></div>
                <div style="max-width:600px; margin:auto; background:#111; padding:15px; border-radius:12px;">
                    ${alb.tracks.map(t => `<div class="track-row" onclick="playSong('${t}', '${alb.img}', '${alb.title}')"><span>${t}</span><span>▶</span></div>`).join('')}
                </div>`;
            document.getElementById('album-view').style.display = 'block';
        }

        function playSong(name, img, alb) {
            const search = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const match = Object.keys(localMusic).find(key => key.replace(/[^a-z0-9]/g, '').includes(search));

            if (match) {
                const audio = document.getElementById('main-audio');
                audio.src = localMusic[match];
                document.getElementById('p-title').innerText = name;
                document.getElementById('p-alb').innerText = alb;
                document.getElementById('p-img').src = img;
                audio.play();
            } else {
                alert("File not found in linked folder: " + name);
            }
        }

        function showTab(id) {
            document.getElementById('music-tab').style.display = id === 'music' ? 'block' : 'none';
            document.getElementById('movies-tab').style.display = id === 'movies' ? 'block' : 'none';
        }

        function closeAlbum() { document.getElementById('album-view').style.display = 'none'; }
        init();
    </script>
</body>
</html>

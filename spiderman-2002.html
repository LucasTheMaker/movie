<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LucasFlix - Spider-Man (2002)</title>
    <style>
        body {
            background-color: #000;
            color: #e5e5e5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .background-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(77deg,rgba(0,0,0,.9) 0,rgba(0,0,0,0) 85%), 
                              url('https://w.wallhaven.cc/full/8o/wallhaven-8owmxj.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            z-index: 10;
        }
        .logo {
            color: #e50914;
            font-weight: bold;
            font-size: 25px;
            text-decoration: none;
        }
        .info-container {
            max-width: 600px;
            padding: 0 4%;
            z-index: 2;
        }
        h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            color: #fff;
        }
        .meta {
            color: #46d369;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .description {
            font-size: 1.2rem;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .play-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 30px;
            cursor: pointer;
        }
        .play-btn:hover { background-color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="background-image"></div>
    <div class="navbar">
        <a href="index.html" class="logo">LUCASFLIX</a>
    </div>
    <div class="info-container">
        <h1>SPIDER-MAN</h1>
        <div class="meta">98% Match &nbsp; 2002 &nbsp; PG-13</div>
        <div class="description">
            After being bitten by a genetically-altered spider, Peter Parker gains superhuman strength and the ability to cling to any surface. He vows to use his abilities to fight crime.
        </div>
        <button class="play-btn" onclick="alert('Starting Movie...')">▶ Play</button>
    </div>
</body>
</html>

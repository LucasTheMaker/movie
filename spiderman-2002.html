<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LucasFlix - Spider-Man (2002)</title>
    <style>
        body { 
            background-color: #000; 
            color: #e5e5e5; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden; 
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Using the high-quality landscape image you selected */
            background-image: url('https://m.media-amazon.com/images/M/MV5BMzY2OTgxOTE3OF5BMl5BanBnXkFtZTYwMTY3OTY3._V1_.jpg'); 
            background-size: cover;
            background-position: center top;
            z-index: -1;
            /* Black gradient fade to keep text readable */
            background-image: linear-gradient(77deg,rgba(0,0,0,.9) 0,rgba(0,0,0,0) 85%);
        }

        .navbar {
            height: 68px;
            display: flex;
            align-items: center;
            padding: 0 4%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
        }
        .logo { color: #e50914; font-weight: bold; font-size: 25px; text-decoration: none;}

        .info-container {
            max-width: 550px;
            text-align: left;
            padding: 0 4%;
            z-index: 2;
        }
        
        .series-tag { color: #e50914; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;}
        
        h1 { font-size: 4.5rem; margin: 0 0 20px 0; font-weight: 900; line-height: 1; }
        
        .meta-data { margin-bottom: 25px; font-weight: bold; color: #46d369; font-size: 1.1rem;} 
        
        .description { font-size: 1.2rem; line-height: 1.5; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,.45); }

        .play-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .play-btn:hover { background-color: rgba(255,255,255,0.75); }

        .back-link { 
            display: block; 
            color: #aaa; 
            margin-top: 25px; 
            text-decoration: none; 
            font-size: 1rem;
        }
        .back-link:hover {color: white;}
    </style>
</head>
<body>

<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Background Hero: Auto-switches based on device */
        .hero {
            width: 100%; height: 55vh;
            background: linear-gradient(to bottom, transparent 50%, #000 100%), url('image_7.png'); /* Desktop pic */
            background-size: cover; background-position: center; position: relative;
        }
        @media (max-width: 768px) { .hero { background-image: url('image_6.png'); } } /* Mobile pic */

        .controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 20px; font-size: 22px; }

        h1 { font-size: 3rem; font-style: italic; letter-spacing: -2px; margin: 0; }
        
        .meta { display: flex; justify-content: center; gap: 8px; margin: 10px 0; font-size: 12px; }
        .badge { border: 1px solid #555; padding: 2px 6px; border-radius: 3px; color: #aaa; }
        
        .play-btn { 
            background: white; color: black; width: 100%; padding: 14px; 
            border-radius: 5px; font-weight: bold; border: none; font-size: 16px; margin: 15px 0;
        }
        
        .synopsis { text-align: left; font-size: 14px; line-height: 1.4; color: #ddd; }

        .tabs { display: flex; border-bottom: 2px solid #333; margin: 20px 0; }
        .tab { padding: 10px 0; margin-right: 25px; font-weight: bold; border-bottom: 3px solid white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid img { width: 100%; border-radius: 5px; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #0f0f0f; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-align: center; font-size: 10px; color: #666; }
    </style>
</head>

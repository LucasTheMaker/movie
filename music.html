<html lang="en">

    <title>Goat Audio - Kanye West</title>
    <style>
        :root { --accent: #fa243c; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 110px; }

        .header { padding: 50px 20px 20px; background: linear-gradient(to bottom, #1a1a1a, #000); }
        h1 { font-size: 34px; font-weight: 800; margin: 0; }
        .subtitle { color: #888; font-size: 14px; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Featured Hero Card */
        .featured-card {
            margin: 20px; height: 260px; border-radius: 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent), 
                        url('https://upload.wikimedia.org/wikipedia/en/4/4d/The_Life_of_Pablo.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        /* Grid Layout */
        .section-title { padding: 10px 20px; font-size: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        
        .album-item { cursor: pointer; margin-bottom: 10px; }
        .album-art { 
            width: 100%; aspect-ratio: 1/1; border-radius: 10px; 
            background-size: cover; background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); margin-bottom: 8px;
            border: 1px solid #222;
        }
        .album-name { font-size: 14px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .album-artist { font-size: 12px; color: #777; }

        /* Floating Player Bar */
        .player-bar {
            position: fixed; bottom: 85px; left: 10px; right: 10px;
            height: 56px; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px);
            border-radius: 8px; display: flex; align-items: center; padding: 0 12px;
            justify-content: space-between; border: 1px solid #333; z-index: 100;
        }

        .play-pause-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Audio - Kanye West</title>
    <style>
        :root { --accent: #fa243c; --bg: #000; --card: #121212; --gray: #888; }
        body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Header Section */
        .artist-header {
            height: 300px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)), url('https://images.alphacoders.com/134/1348128.png');
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 20px;
        }
        
        .artist-name { font-size: 60px; font-weight: 900; margin: 0; }

        /* Interface Section */
        .content { padding: 20px; }
        select { 
            width: 100%; padding: 15px; border-radius: 8px; background: #222; 
            color: white; border: 1px solid #333; font-size: 16px; margin-bottom: 20px;
        }

        .track-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; border-bottom: 1px solid #1a1a1a;
        }
        .track-name { font-weight: 500; color: #fff; }
        .explicit-tag { background: #555; font-size: 10px; padding: 2px 4px; border-radius: 2px; margin-left: 8px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #222;
        }
        .nav-item { color: var(--gray); text-decoration: none; font-size: 12px; text-align: center; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div class="artist-header">
        <h1 class="artist-name">Kanye West</h1>
    </div>

    <div class="content">
        <p style="color: var(--gray);">Choose an album to explore tracks:</p>
        <select id="albumSelect" onchange="loadAlbum()">
            <option value="">-- Browse Discography --</option>
        </select>

        <div id="track-container">
            <h2 id="albumTitle" style="color: var(--accent);"></h2>
            <div id="trackList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">🏠<br>Movies</a>
        <a href="music.html" class="nav-item active">🎵<br>Music</a>
        <a href="#" class="nav-item">📚<br>Library</a>
    </div>

    <script src="kanye_data.js"></script>
    <script>
        const select = document.getElementById('albumSelect');
        const list = document.getElementById('trackList');
        const title = document.getElementById('albumTitle');

        // Load albums into dropdown
        Object.keys(KANYE_DATABASE).forEach(album => {
            let opt = document.createElement('option');
            opt.value = album;
            opt.textContent = album.replace(/_/g, ' ');
            select.appendChild(opt);
        });

        function loadAlbum() {
            const key = select.value;
            list.innerHTML = "";
            if (!key) return;

            const album = KANYE_DATABASE[key];
            title.textContent = key.replace(/_/g, ' ');
            
            album.tracks.forEach((track, index) => {
                let isExplicit = track.includes('[E]');
                let cleanName = track.replace('[E]', '');
                
                list.innerHTML += `
                    <div class="track-row">
                        <div>
                            <span style="color: #666; margin-right: 15px;">${index + 1}</span>
                            <span class="track-name">${cleanName}</span>
                            ${isExplicit ? '<span class="explicit-tag">E</span>' : ''}
                        </div>
                        <span style="color: #666;">▶</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
